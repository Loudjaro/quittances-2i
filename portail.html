<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mon Portail 2i">
<title>Portail Locataire — Immeuble 2i</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
.topbar{background:#1a1a1a;padding:20px 16px 16px;text-align:center;}
.logo{font-size:18px;font-weight:700;color:#fff;}
.logo-sub{font-size:12px;color:#aaa;margin-top:3px;}
.screen{padding:16px;display:none;}
.screen.active{display:block;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.login-box{max-width:360px;margin:40px auto;}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center;}
.login-box p{font-size:13px;color:#888;text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:#666;margin-bottom:5px;display:block;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;font-size:15px;padding:12px 14px;border:1px solid #e5e5e5;border-radius:12px;background:#f8f8f8;color:#1a1a1a;}
.form-group textarea{height:100px;resize:none;}
.btn{display:block;width:100%;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn:active{opacity:.85;}
.btn-outline{display:block;width:100%;padding:12px;background:transparent;color:#1a1a1a;border:1px solid #e5e5e5;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px;text-align:left;}
.error-box{background:#fde8e8;border-radius:10px;padding:12px 14px;font-size:13px;color:#c0392b;margin-bottom:14px;display:none;}
.success-box{background:#d4f0d8;border-radius:10px;padding:12px 14px;font-size:13px;color:#1e5c26;margin-bottom:14px;display:none;}
.welcome{background:#1a1a1a;border-radius:14px;padding:16px;margin-bottom:16px;}
.welcome-nom{font-size:18px;font-weight:700;color:#fff;}
.welcome-appt{font-size:13px;color:#aaa;margin-top:3px;}
.metric{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.metric:last-child{border-bottom:none;}
.metric-label{font-size:12px;color:#888;}
.metric-val{font-size:15px;font-weight:600;}
.metric-val.green{color:#2d7a3a;}
.metric-val.red{color:#c0392b;}
.pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;}
.pill-g{background:#d4f0d8;color:#1e5c26;}
.pill-r{background:#fde8e8;color:#c0392b;}
.pill-a{background:#fef3e2;color:#a05c00;}
.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:10;}
.nav-btn{flex:1;padding:12px 4px;font-size:11px;color:#888;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;}
.nav-btn.active{color:#1a1a1a;font-weight:600;border-bottom:2px solid #1a1a1a;}
.quittance-row{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.quittance-mois{font-size:14px;font-weight:500;}
.quittance-montant{font-size:13px;color:#888;}
.dl-btn{padding:8px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.dl-btn:disabled{background:#ccc;cursor:default;}
.spinner-inline{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top:2px solid transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-box{text-align:center;padding:40px 20px;color:#888;font-size:14px;}
.spinner{width:28px;height:28px;border:3px solid #e5e5e5;border-top:3px solid #1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
.logout{display:block;width:100%;padding:12px;background:transparent;color:#888;border:1px solid #e5e5e5;border-radius:12px;font-size:13px;cursor:pointer;margin-top:8px;text-align:center;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;}
.form-actions{display:flex;gap:10px;margin-top:16px;}
.form-actions button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.btn-cancel{background:#f0f0f0;color:#666;}
.btn-save{background:#1a1a1a;color:#fff;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.row:last-child{border-bottom:none;}
.row-label{color:#666;}
.row-val{font-weight:500;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Immeuble 2i</div>
  <div class="logo-sub">Portail Locataire</div>
</div>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <h2>Connexion</h2>
    <p>Accédez à votre espace personnel</p>
    <div class="error-box" id="login-error">Identifiant ou mot de passe incorrect.</div>
    <div class="form-group">
      <label class="form-label">Identifiant</label>
      <input type="text" id="input-id" placeholder="Votre identifiant" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" id="input-mdp" placeholder="••••••" autocomplete="current-password">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <input type="checkbox" id="remember-me" checked style="width:16px;height:16px;accent-color:#2048F5;">
      <label for="remember-me" style="font-size:13px;color:#666;">Se souvenir de moi</label>
    </div>
    <button class="btn" onclick="seConnecter()">Se connecter</button>
    <p style="font-size:12px;color:#aaa;text-align:center;margin-top:16px;">Identifiants fournis par la direction de l'Immeuble 2i.</p>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-main">
  <div id="main-content"></div>
</div>

<!-- MODAL RÉPONSE LOCATAIRE -->
<div class="modal-overlay" id="modal-reponse-loc">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Répondre à la Direction</div>
    <div class="form-group"><label class="form-label">Votre message</label>
      <textarea id="rep-loc-texte" placeholder="Votre réponse..." style="height:120px;resize:none;"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModalLoc('modal-reponse-loc')">Annuler</button>
      <button class="btn-save" onclick="envoyerReponseLoc()">Envoyer</button>
    </div>
  </div>
</div>

<!-- MODAL SIGNALEMENT -->
<div class="modal-overlay" id="modal-signal">
  <div class="modal">
    <div class="modal-title">Signaler un problème</div>
    <div class="success-box" id="signal-success">Votre signalement a été envoyé. Nous vous contacterons prochainement.</div>
    <div class="form-group">
      <label class="form-label">Type de problème</label>
      <select id="signal-type">
        <option>Plomberie (fuite, robinet)</option>
        <option>Électricité (panne, disjoncteur)</option>
        <option>Climatisation</option>
        <option>Serrure / Porte</option>
        <option>Nuisances sonores</option>
        <option>Parties communes</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="signal-desc" placeholder="Décrivez le problème..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Urgence</label>
      <select id="signal-urgence">
        <option>Normal</option>
        <option>Urgent</option>
        <option>Très urgent</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-signal')">Annuler</button>
      <button class="btn-save" onclick="envoyerSignalement()">Envoyer</button>
    </div>
  </div>
</div>

const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyYgCy0LSdUNRIeY_VgYsWVamBtuIOE5wJilg-zB-hM55qQy3ID9eyBx7YyKrqrSCGTZw/exec';
const MOIS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

let session = null;

const urlParams = new URLSearchParams(window.location.search);
const idFromUrl = urlParams.get('id');
if (idFromUrl) {
  document.getElementById('input-id').value = decodeURIComponent(idFromUrl);
} else {
  const savedId = localStorage.getItem('2i_login_id');
  if (savedId) {
    document.getElementById('input-id').value = savedId;
    const savedMdp = localStorage.getItem('2i_login_mdp_' + savedId);
    if (savedMdp) document.getElementById('input-mdp').value = savedMdp;
  }
}

async function seConnecter() {
  const id  = document.getElementById('input-id').value.trim();
  const mdp = document.getElementById('input-mdp').value.trim();
  if (!id || !mdp) { showError('Veuillez renseigner vos identifiants.'); return; }
  try {
    const res  = await fetch(WEBAPP_URL + '?action=getPortail&id=' + encodeURIComponent(id) + '&mdp=' + encodeURIComponent(mdp));
    const data = await res.json();
    if (data.success) {
      // Mémoriser identifiant et mot de passe
      const cb = document.getElementById('remember-me');
      if (cb && cb.checked) {
        localStorage.setItem('2i_login_id', id);
        localStorage.setItem('2i_login_mdp_' + id, mdp);
      } else {
        localStorage.removeItem('2i_login_id');
        localStorage.removeItem('2i_login_mdp_' + id);
      }
      session = { id, ...data.locataire };
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('screen-login').classList.remove('active');
      document.getElementById('screen-main').classList.add('active');
      chargerAccueil();
    } else {
      showError('Identifiant ou mot de passe incorrect.');
    }
  } catch(e) {
    showError('Erreur de connexion. Réessayez.');
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function fmt(n) { return Math.round(n||0).toLocaleString('fr-FR') + ' Fr CFA'; }

function moisLabel(slug) {
  const y = slug.substring(0,4), m = parseInt(slug.substring(4,6))-1;
  return MOIS_FR[m] + ' ' + y;
}

function renderNav(onglet) {
  return `<div class="nav">
    <button class="nav-btn ${onglet==='accueil'?'active':''}" onclick="chargerAccueil()">Accueil</button>
    <button class="nav-btn ${onglet==='quittances'?'active':''}" onclick="chargerQuittances()">Quittances</button>
    <button class="nav-btn ${onglet==='infos'?'active':''}" onclick="chargerInfos()">Mon appart</button>
    <button class="nav-btn ${onglet==='contact'?'active':''}" onclick="chargerContact()">Contact</button>
  </div>`;
}

async function chargerAccueil() {
  document.getElementById('main-content').innerHTML = renderNav('accueil') +
    '<div style="padding:16px;"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>';

  try {
    const res  = await fetch(WEBAPP_URL + '?action=getHistorique&id=' + encodeURIComponent(session.id));
    const data = await res.json();
    const l    = data.success ? data : { loyer:0, paiements:[] };
    const dernier = l.paiements && l.paiements.length > 0 ? l.paiements[0] : null;
    const paye = dernier !== null;

    document.getElementById('main-content').innerHTML = renderNav('accueil') +
      `<div style="padding:16px;">
        <div class="welcome">
          <div class="welcome-nom">Bonjour ${session.nom ? session.nom.split(' ')[0] : ''}</div>
          <div class="welcome-appt">Appartement ${session.appt} — Immeuble 2i</div>
        </div>
        <div class="card">
          <div class="card-title">Situation du mois</div>
          <div class="metric">
            <div><div class="metric-label">Loyer mensuel</div><div class="metric-val">${fmt(l.loyer||0)}</div></div>
            <span class="pill ${paye?'pill-g':'pill-r'}">${paye?'Payé':'En attente'}</span>
          </div>
          ${dernier?`<div class="metric"><div class="metric-label">Dernier paiement</div><div class="metric-val green">${dernier.datePaie||'—'}</div></div>`:''}
        </div>
        <div class="card">
          <div class="card-title">Actions rapides</div>
          <button class="btn-outline" onclick="chargerQuittances()">📄 &nbsp;Télécharger mes quittances</button>
          <button class="btn-outline" onclick="openModal('modal-signal')">🔧 &nbsp;Signaler un problème</button>
          <button class="btn-outline" onclick="chargerContact()">📞 &nbsp;Contacter la direction</button>
        </div>
        <button class="logout" onclick="seDeconnecter()">Se déconnecter</button>
      </div>`;
  } catch(e) {
    document.getElementById('main-content').innerHTML = renderNav('accueil') +
      '<div style="padding:16px;"><div class="card">Erreur de chargement. Actualisez la page.</div></div>';
  }
}

async function chargerQuittances() {
  document.getElementById('main-content').innerHTML = renderNav('quittances') +
    '<div style="padding:16px;"><div class="loading-box"><div class="spinner"></div>Chargement de vos quittances...</div></div>';

  try {
    const res  = await fetch(WEBAPP_URL + '?action=getHistorique&id=' + encodeURIComponent(session.id));
    const data = await res.json();

    let html = renderNav('quittances') + '<div style="padding:16px;">';
    html += '<div class="card"><div class="card-title">Mes quittances — 6 derniers mois</div>';

    if (!data.success || !data.paiements || data.paiements.length === 0) {
      html += '<p style="font-size:13px;color:#888;text-align:center;padding:20px 0;">Aucune quittance disponible pour le moment.</p>';
    } else {
      data.paiements.forEach(function(p) {
        html += `<div class="quittance-row">
          <div>
            <div class="quittance-mois">${moisLabel(p.moisSlug)}</div>
            <div class="quittance-montant">${fmt(p.montant)}</div>
          </div>
          <button class="dl-btn" id="btn-${p.moisSlug}" onclick="telechargerQuittance('${p.moisSlug}','${p.datePaie}','${p.modePaie}',${p.montant})">
            Télécharger
          </button>
        </div>`;
      });
    }
    html += '</div></div>';
    document.getElementById('main-content').innerHTML = html;
  } catch(e) {
    document.getElementById('main-content').innerHTML = renderNav('quittances') +
      '<div style="padding:16px;"><p style="color:#c0392b;">Erreur de chargement.</p></div>';
  }
}

async async function telechargerQuittance(moisSlug, datePaie, modePaie, montant) {
  const btn = document.getElementById('btn-' + moisSlug);
  btn.disabled = true; btn.textContent = '...';

  if (!window.jspdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    const y = parseInt(moisSlug.substring(0,4));
    const m = parseInt(moisSlug.substring(4,6)) - 1;
    const MOIS = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
    const lastDay = new Date(y, m+1, 0).getDate();
    const dDebut = '01/' + String(m+1).padStart(2,'0') + '/' + y;
    const dFin = lastDay + '/' + String(m+1).padStart(2,'0') + '/' + y;
    const nom = session.nom || '';
    const appt = session.appt || '';
    const ref = moisSlug + appt;
    const fmt = n => Math.round(n||0).toLocaleString('fr-FR') + ' Fr CFA';
    const W = 210, mg = 15;
    let y0 = 0;

    doc.setFillColor(32, 72, 245);
    doc.rect(0, 0, W, 28, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(16); doc.setFont('helvetica','bold');
    doc.text('2i Immobilier', mg, 11);
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Palmeraies, Cocody / Abidjan, Cote d\'Ivoire', mg, 17);
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text('QUITTANCE DE LOYER', W-mg, 11, {align:'right'});
    doc.setTextColor(200,210,255); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Periode du ' + dDebut + ' au ' + dFin, W-mg, 22, {align:'right'});
    doc.text('Ref.: ' + ref, W-mg, 26, {align:'right'});

    y0 = 36;
    doc.setFillColor(248,250,255);
    doc.rect(mg, y0, 82, 28, 'F');
    doc.rect(W/2+2, y0, 82, 28, 'F');
    doc.setDrawColor(32,72,245); doc.setLineWidth(0.8);
    doc.line(mg, y0, mg, y0+28);
    doc.setDrawColor(130,32,245);
    doc.line(W/2+2, y0, W/2+2, y0+28);
    doc.setLineWidth(0.2);
    doc.setTextColor(148,163,184); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('BAILLEUR', mg+4, y0+6);
    doc.text('LOCATAIRE', W/2+6, y0+6);
    doc.setTextColor(15,23,42); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('Madame Diaby Djeneba', mg+4, y0+12);
    doc.text(nom, W/2+6, y0+12);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(71,85,105);
    doc.text('Immeuble 2i - Palmeraies, Cocody', mg+4, y0+18);
    doc.text('Abidjan, Cote d\'Ivoire', mg+4, y0+23);
    doc.text('Appt ' + appt, W/2+6, y0+18);
    doc.text('Immeuble 2i, Palmeraies, Cocody', W/2+6, y0+23);

    y0 += 34;
    doc.setFillColor(238,242,255);
    doc.rect(mg, y0, W-2*mg, 16, 'F');
    doc.setTextColor(60,32,245); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    const decl = 'Je soussignee, Madame Diaby Djeneba, declare avoir recu de ' + nom +
      ', locataire de l\'appartement ' + appt +
      ', la somme de ' + fmt(montant) + ' pour la periode du ' + dDebut + ' au ' + dFin + '.';
    const lines = doc.splitTextToSize(decl, W-2*mg-8);
    doc.text(lines, mg+4, y0+6);

    y0 += 22;
    doc.setFillColor(32,72,245);
    doc.rect(mg, y0, W-2*mg, 8, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('Designation', mg+3, y0+5.5);
    doc.text('Montant', W-mg-3, y0+5.5, {align:'right'});

    y0 += 8;
    doc.setFillColor(248,250,255);
    doc.rect(mg, y0, W-2*mg, 7, 'F');
    doc.setTextColor(15,23,42); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.text('Loyer mensuel - ' + MOIS[m] + ' ' + y, mg+3, y0+4.8);
    doc.text(fmt(montant), W-mg-3, y0+4.8, {align:'right'});
    doc.setDrawColor(226,232,240); doc.line(mg, y0+7, W-mg, y0+7);
    y0 += 7;

    doc.setFillColor(255,255,255);
    doc.rect(mg, y0, W-2*mg, 7, 'F');
    doc.setTextColor(71,85,105);
    doc.text('Charges locatives', mg+3, y0+4.8);
    doc.text('0 Fr CFA', W-mg-3, y0+4.8, {align:'right'});
    doc.line(mg, y0+7, W-mg, y0+7);
    y0 += 7;

    doc.setFillColor(32,72,245);
    doc.rect(mg, y0, W-2*mg, 8, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.text('Total recu', mg+3, y0+5.5);
    doc.text(fmt(montant), W-mg-3, y0+5.5, {align:'right'});

    y0 += 14;
    doc.setTextColor(71,85,105); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    doc.text('Mode de paiement : ' + (modePaie||'Depot bancaire'), mg, y0);
    doc.text('Date d\'emission : ' + (datePaie||''), mg, y0+6);

    y0 += 14;
    doc.setDrawColor(226,232,240); doc.setLineWidth(0.3);
    doc.rect(mg, y0, W-2*mg, 10);
    doc.setTextColor(148,163,184); doc.setFontSize(7);
    doc.text('Quittance etablie conformement a la loi ivoirienne n77-1444 du 14 decembre 1977.', mg+3, y0+4);
    doc.text('Valable uniquement apres encaissement effectif du loyer.', mg+3, y0+8);

    doc.save('Quittance_' + nom.replace(/\s+/g,'_') + '_' + MOIS[m] + '_' + y + '.pdf');
    btn.disabled = false; btn.textContent = 'Telecharger';
  } catch(e) {
    alert('Erreur : ' + e.message);
    btn.disabled = false; btn.textContent = 'Telecharger';
  }
}

async function envoyerSignalement() {
  const type    = document.getElementById('signal-type').value;
  const desc    = document.getElementById('signal-desc').value;
  const urgence = document.getElementById('signal-urgence').value;
  if (!desc.trim()) { alert('Veuillez décrire le problème.'); return; }
  try {
    await fetch(WEBAPP_URL, { method:'POST', body: JSON.stringify({
      action:'signalerProbleme', locataire:session.nom, appt:session.appt, type, desc, urgence
    })});
  } catch(e) {}
  document.getElementById('signal-success').style.display = 'block';
  document.getElementById('signal-desc').value = '';
  setTimeout(function(){ closeModal('modal-signal'); }, 2500);
}

function openModal(id) {
  document.getElementById('signal-success').style.display = 'none';
  document.getElementById(id).classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function seDeconnecter() {
  session = null;
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('input-mdp').value = '';
}

document.getElementById('modal-signal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('modal-signal');
});
document.getElementById('input-mdp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') seConnecter();
});

function openModalLoc(id) { document.getElementById(id).classList.add('open'); }
function closeModalLoc(id) { document.getElementById(id).classList.remove('open'); }
</script>
