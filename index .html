<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Immeuble 2i">
<title>Immeuble 2i</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
.topbar{background:#fff;padding:16px 16px 12px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.appname{font-size:17px;font-weight:600;color:#1a1a1a;}
.sync-info{font-size:11px;color:#888;margin-top:2px;}
.sync-btn{font-size:12px;color:#1a1a1a;background:#f0f0f0;padding:6px 14px;border-radius:99px;border:none;cursor:pointer;font-weight:500;}
.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;overflow-x:auto;}
.nav-btn{flex:1;padding:12px 4px;font-size:12px;font-weight:400;color:#888;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:0;}
.nav-btn.active{color:#1a1a1a;font-weight:600;border-bottom:2px solid #1a1a1a;}
.screen{padding:16px;display:none;}
.screen.active{display:block;}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;}
.metric.full{grid-column:1/-1;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;}
.metric-val{font-size:22px;font-weight:600;color:#1a1a1a;}
.metric-val.green{color:#2d7a3a;}
.metric-val.red{color:#c0392b;}
.metric-sub{font-size:11px;color:#888;margin-top:2px;}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.progress-bg{background:#e5e5e5;border-radius:99px;height:7px;margin-bottom:16px;}
.progress-fill{height:7px;border-radius:99px;background:#2d7a3a;transition:width .4s;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:10px;}
.loc-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.loc-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.av-g{background:#d4f0d8;color:#1e5c26;}
.av-r{background:#fde8e8;color:#c0392b;}
.av-a{background:#fef3e2;color:#a05c00;}
.loc-nom{font-size:14px;font-weight:500;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.loc-sub{font-size:11px;color:#888;margin-top:1px;}
.pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;flex-shrink:0;margin-left:8px;}
.pill-g{background:#d4f0d8;color:#1e5c26;}
.pill-r{background:#fde8e8;color:#c0392b;}
.pill-a{background:#fef3e2;color:#a05c00;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.row:last-child{border-bottom:none;}
.row.total{font-weight:600;padding-top:12px;margin-top:4px;border-top:1px solid #e5e5e5;}
.row-label{color:#666;}
.row-val{font-weight:500;}
.row-val.pos{color:#2d7a3a;}
.row-val.neg{color:#c0392b;}
.alert-box{background:#fef3e2;border-radius:12px;padding:12px 14px;font-size:13px;color:#a05c00;margin-top:4px;line-height:1.5;}
.error-box{background:#fde8e8;border-radius:12px;padding:14px;font-size:13px;color:#c0392b;margin-bottom:14px;line-height:1.5;}
.loading-box{text-align:center;padding:50px 20px;color:#888;font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top:3px solid #1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.scenario-card{border:1px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:10px;}
.scenario-title{font-size:13px;font-weight:600;margin-bottom:8px;}
.scenario-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px;}
.scenario-result{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-top:10px;padding-top:10px;border-top:1px solid #e5e5e5;}
.tab-toggle{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-toggle button{flex:1;padding:7px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#888;}
.tab-toggle button.active{background:#fff;color:#1a1a1a;font-weight:600;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="appname">Immeuble 2i</div>
    <div class="sync-info" id="sync-info">Chargement...</div>
  </div>
  <button class="sync-btn" onclick="chargerDonnees()">Actualiser</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('paiements',this)">Paiements</button>
  <button class="nav-btn" onclick="showTab('finances',this)">Finances</button>
  <button class="nav-btn" onclick="showTab('locataires',this)">Locataires</button>
  <button class="nav-btn" onclick="showTab('scenarios',this)">Scénarios</button>
</div>

<div class="screen active" id="tab-paiements">
  <div id="paiements-content"><div class="loading-box"><div class="spinner"></div>Connexion au Sheets...</div></div>
</div>
<div class="screen" id="tab-finances">
  <div id="finances-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>
<div class="screen" id="tab-locataires">
  <div id="locataires-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>
<div class="screen" id="tab-scenarios">
  <div id="scenarios-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>

<script>
const API_KEY = 'AIzaSyDEGQ_kFuFog6_s5kApOD8God2Nidf5DKg';
const SHEET_ID = '1OxKQZx2b4byPgp8io6EbYNxlDpbzapI73oszBs-piXs';
const RANGE = 'Feuille 1!A2:P21';
const CHARGES_FIXES = 370000;
const LOYER_THEORIQUE = 4560000;

let locataires = [];
let periodeFinances = 'mensuel';

function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }
function initials(s){ return (s||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }

async function chargerDonnees(){
  document.getElementById('sync-info').textContent = 'Synchronisation...';
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const rows = data.values || [];
    locataires = rows
      .filter(r => r[1] && r[1].trim() !== '' && !r[1].includes('Appartement à la'))
      .map(r => ({
        nom: (r[1]||'').trim(),
        prenom: (r[2]||'').trim(),
        tel: r[5]||'',
        email: r[6]||'',
        appt: r[7]||'',
        zone: (r[8]||'').replace('Côté ',''),
        loyer: parseInt((r[12]||'0').toString().replace(/\s/g,''))||0,
        modePaie: r[13]||'',
        paye: r[14]==='TRUE'||r[14]==='VRAI'||r[14]===true,
        datePaie: r[15]||'',
      }));
    const now = new Date();
    document.getElementById('sync-info').textContent = 'Mis à jour ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    renderPaiements();
    renderFinances();
    renderLocataires();
    renderScenarios();
  } catch(e){
    document.getElementById('sync-info').textContent = 'Erreur de connexion';
    ['paiements','finances','locataires','scenarios'].forEach(t=>{
      document.getElementById(t+'-content').innerHTML =
        `<div class="error-box">Impossible de charger les données.<br><br>Vérifiez que votre Sheets est partagé en "Toute personne ayant le lien" et que l'API Google Sheets est activée.<br><br>Erreur : ${e.message}</div>`;
    });
  }
}

function renderPaiements(){
  const payes = locataires.filter(l=>l.paye);
  const nonPayes = locataires.filter(l=>!l.paye);
  const montant = payes.reduce((s,l)=>s+l.loyer,0);
  const pct = locataires.length ? Math.round(payes.length/locataires.length*100) : 0;

  let html = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Loyers perçus</div><div class="metric-val">${payes.length}/${locataires.length}</div><div class="metric-sub">locataires</div></div>
      <div class="metric"><div class="metric-label">Encaissé</div><div class="metric-val green">${fmt(montant)}</div><div class="metric-sub">Fr CFA</div></div>
    </div>
    <div class="section-title">Recouvrement — ${pct}%</div>
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if(payes.length){
    html += `<div class="section-title">Payés (${payes.length})</div>`;
    payes.forEach(l=>{
      html += `<div class="loc-card"><div class="loc-left"><div class="avatar av-g">${initials(l.nom+' '+l.prenom)}</div><div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div><div class="loc-sub">Appt ${l.appt} · ${fmt(l.loyer)} Fr · ${l.datePaie}</div></div></div><span class="pill pill-g">Payé</span></div>`;
    });
  }
  if(nonPayes.length){
    html += `<div class="section-title" style="margin-top:16px;">En attente (${nonPayes.length})</div>`;
    nonPayes.forEach(l=>{
      html += `<div class="loc-card"><div class="loc-left"><div class="avatar av-r">${initials(l.nom+' '+l.prenom)}</div><div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div><div class="loc-sub">Appt ${l.appt} · ${fmt(l.loyer)} Fr CFA</div></div></div><span class="pill pill-r">En attente</span></div>`;
    });
  }
  document.getElementById('paiements-content').innerHTML = html;
}

function renderFinances(){
  const payes = locataires.filter(l=>l.paye);
  const encaisse = payes.reduce((s,l)=>s+l.loyer,0);
  const M = periodeFinances==='mensuel';
  const k = M ? 1 : 12;
  const loyers = LOYER_THEORIQUE*k;
  const charges = CHARGES_FIXES*k;
  const prov = Math.round(LOYER_THEORIQUE*0.05)*k;
  const net = loyers - charges - prov;

  document.getElementById('finances-content').innerHTML = `
    <div class="tab-toggle">
      <button class="${M?'active':''}" onclick="setPeriode('mensuel',this)">Mensuel</button>
      <button class="${!M?'active':''}" onclick="setPeriode('annuel',this)">Annuel</button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Loyers théoriques</div><div class="metric-val">${fmt(loyers)}</div><div class="metric-sub">Fr CFA</div></div>
      <div class="metric"><div class="metric-label">Encaissé ce mois</div><div class="metric-val green">${fmt(encaisse)}</div><div class="metric-sub">Fr CFA</div></div>
    </div>
    <div class="section-title">Compte de résultat</div>
    <div class="card">
      <div class="row"><span class="row-label">Loyers théoriques</span><span class="row-val pos">+ ${fmt(loyers)} Fr</span></div>
      <div class="row"><span class="row-label">Salaire gardien</span><span class="row-val neg">- ${fmt(90000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Eau + électricité</span><span class="row-val neg">- ${fmt(30000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Taxe foncière</span><span class="row-val neg">- ${fmt(125000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Assurance immeuble</span><span class="row-val neg">- ${fmt(125000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Provision travaux (5%)</span><span class="row-val neg">- ${fmt(prov)} Fr</span></div>
      <div class="row total"><span>Revenu net estimé</span><span class="row-val pos">${fmt(net)} Fr</span></div>
    </div>
    <div class="alert-box">Assurance immeuble : à souscrire en urgence — 1 500 000 Fr CFA de risque non couvert.</div>`;
}

function setPeriode(p, btn){
  periodeFinances = p;
  document.querySelectorAll('.tab-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFinances();
}

function renderLocataires(){
  let html = `<div class="section-title">${locataires.length} locataires</div>`;
  locataires.forEach(l=>{
    const av = l.paye?'av-g':'av-a';
    const pl = l.paye?'pill-g':'pill-a';
    const pt = l.paye?'Payé':'En attente';
    html += `<div class="loc-card"><div class="loc-left"><div class="avatar ${av}">${initials(l.nom+' '+l.prenom)}</div><div style="min-width:0;"><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div><div class="loc-sub">Appt ${l.appt} · ${l.zone} · ${fmt(l.loyer)} Fr CFA</div>${l.tel?`<div class="loc-sub">${l.tel}</div>`:''}</div></div><span class="pill ${pl}">${pt}</span></div>`;
  });
  document.getElementById('locataires-content').innerHTML = html;
}

function renderScenarios(){
  const ann = LOYER_THEORIQUE * 12;
  const ch = (CHARGES_FIXES * 12) + (LOYER_THEORIQUE * 0.05 * 12);
  const sc = [
    {label:'Optimiste — 100% encaissé',pct:100,color:'#1e5c26',bg:'#d4f0d8'},
    {label:'Réaliste — 90% encaissé',pct:90,color:'#185FA5',bg:'#E6F1FB'},
    {label:'Prudent — 80% encaissé',pct:80,color:'#a05c00',bg:'#fef3e2'},
    {label:'Dégradé — 70% encaissé',pct:70,color:'#c0392b',bg:'#fde8e8'},
  ];
  let html = `<div class="section-title">Simulation annuelle</div>`;
  sc.forEach(s=>{
    const loyers = Math.round(ann * s.pct/100);
    const impay = ann - loyers;
    const net = loyers - ch;
    html += `<div class="scenario-card" style="border-color:${s.color}40;">
      <div class="scenario-title" style="color:${s.color};">${s.label}</div>
      <div class="scenario-row"><span>Loyers encaissés</span><span>${fmt(loyers)} Fr</span></div>
      ${impay?`<div class="scenario-row"><span>Impayés</span><span style="color:#c0392b;">- ${fmt(impay)} Fr</span></div>`:''}
      <div class="scenario-row"><span>Charges totales</span><span>- ${fmt(Math.round(ch))} Fr</span></div>
      <div class="scenario-result"><span>Revenu net</span><span style="color:${s.color};">${fmt(net)} Fr CFA</span></div>
    </div>`;
  });
  document.getElementById('scenarios-content').innerHTML = html;
}

function showTab(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

chargerDonnees();
</script>
</body>
</html>
