<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Immeuble 2i</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --blue:#1a56db; --blue-dark:#1e429f; --blue-light:#ebf5ff;
  --green:#057a55; --green-light:#f3faf7;
  --red:#e02424; --red-light:#fdf2f2;
  --amber:#d97706; --amber-light:#fffbeb;
  --violet:#7e3af2; --violet-light:#f5f3ff;
  --gray-900:#111827; --gray-700:#374151; --gray-500:#6b7280;
  --gray-400:#9ca3af; --gray-200:#e5e7eb; --gray-100:#f3f4f6; --gray-50:#f9fafb;
  --white:#ffffff; --radius:14px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}
/* HEADER */
.header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;padding:16px 16px 12px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:18px;font-weight:700;}
.header-sub{font-size:12px;opacity:.75;margin-top:2px;}
.btn-actualiser{background:rgba(255,255,255,.2);color:white;border:1.5px solid rgba(255,255,255,.4);padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;}
/* NAV */
.nav{display:flex;background:var(--white);border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;position:sticky;top:72px;z-index:99;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{flex-shrink:0;padding:12px 14px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;position:relative;}
.nav-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:white;border-radius:99px;font-size:10px;font-weight:700;min-width:17px;height:17px;padding:0 4px;margin-left:4px;}
/* CARDS */
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--blue);color:white;border-radius:var(--radius);padding:16px;}
.stat-card.light{background:var(--white);border:1px solid var(--gray-200);color:var(--gray-900);}
.stat-label{font-size:11px;opacity:.8;margin-bottom:4px;font-weight:500;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.stat-sub{font-size:11px;opacity:.7;margin-top:2px;}
/* PROGRESS */
.progress-bar{height:6px;background:var(--gray-200);border-radius:3px;margin:10px 0;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--violet));}
/* LOCATAIRES */
.section-title{font-size:11px;font-weight:700;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;padding:12px 16px 6px;}
.loc-card{background:var(--white);border-radius:var(--radius);margin:0 10px 8px;padding:14px;box-shadow:var(--shadow);}
.loc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.loc-info{display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.av-green{background:#d1fae5;color:#065f46;}
.av-red{background:#fee2e2;color:#991b1b;}
.av-gray{background:var(--gray-100);color:var(--gray-500);}
.loc-nom{font-size:14px;font-weight:600;}
.loc-sub{font-size:11px;color:var(--gray-500);margin-top:2px;}
.loc-actions{display:flex;gap:7px;flex-wrap:wrap;}
/* PILLS */
.pill{display:inline-flex;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.pill-green{background:var(--green-light);color:var(--green);}
.pill-red{background:var(--red-light);color:var(--red);}
.pill-amber{background:var(--amber-light);color:var(--amber);}
.pill-blue{background:var(--blue-light);color:var(--blue);}
.pill-violet{background:var(--violet-light);color:var(--violet);}
/* BOUTONS */
button{cursor:pointer;border:none;border-radius:99px;font-weight:600;transition:opacity .15s;}
button:active{opacity:.7;}
.btn-primary{background:var(--blue);color:white;padding:10px 18px;font-size:13px;width:100%;}
.btn-blue{background:var(--blue);color:white;padding:7px 14px;font-size:12px;}
.btn-red{background:var(--red-light);color:var(--red);padding:7px 14px;font-size:12px;}
.btn-violet{background:var(--violet-light);color:var(--violet);padding:7px 14px;font-size:12px;}
.btn-green{background:var(--green-light);color:var(--green);padding:7px 14px;font-size:12px;}
.btn-gray{background:var(--gray-100);color:var(--gray-700);padding:7px 14px;font-size:12px;}
.btn-save{background:var(--blue);color:white;padding:12px 24px;font-size:14px;flex:1;}
.btn-cancel{background:var(--gray-100);color:var(--gray-700);padding:12px 24px;font-size:14px;flex:1;}
/* SELECT */
.mode-select{font-size:12px;padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:99px;background:var(--white);color:var(--gray-700);cursor:pointer;}
.mode-select:focus{outline:none;border-color:var(--blue);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;background:var(--white);}
.form-group textarea{min-height:80px;resize:vertical;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.form-actions{display:flex;gap:10px;margin-top:20px;}
/* TRÉSORERIE */
.trés-section{font-size:11px;font-weight:700;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;padding:14px 16px 6px;}
.op-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.op-row:last-child{border-bottom:none;}
.op-label{font-size:13px;font-weight:500;}
.op-sub{font-size:11px;color:var(--gray-500);margin-top:2px;}
.op-val.pos{color:var(--green);font-weight:600;font-size:13px;}
.op-val.neg{color:var(--red);font-weight:600;font-size:13px;}
/* ARCHIVES */
.arch-table{width:100%;border-collapse:collapse;font-size:11px;}
.arch-table th{background:var(--gray-100);padding:6px 4px;text-align:center;font-weight:600;font-size:10px;}
.arch-table td{padding:5px 4px;text-align:center;border-bottom:1px solid var(--gray-100);}
.arch-table td:first-child{text-align:left;font-size:11px;font-weight:500;}
/* FINANCES */
.fin-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.fin-row:last-child{border-bottom:none;font-weight:700;font-size:15px;}
/* TRAVAUX */
.travail-card{background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,var(--blue-dark),var(--blue));}
.login-card{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo h1{font-size:22px;font-weight:800;color:var(--blue);}
.login-logo p{font-size:12px;color:var(--gray-500);margin-top:4px;}
/* ERREUR */
.erreur{color:var(--red);text-align:center;padding:16px;font-size:14px;}
/* MOIS MULTI */
.mois-checkbox{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);cursor:pointer;}
.mois-checkbox:last-child{border-bottom:none;}
.mois-cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--gray-300,#d1d5db);cursor:pointer;}
.mois-nom{font-size:14px;font-weight:500;}
.mois-sub{font-size:11px;color:var(--gray-500);}
/* NUMÉRO TRANSACTION */
.num-trans-wrap{background:var(--blue-light);border-radius:10px;padding:10px 12px;margin-bottom:12px;display:none;}
.num-trans-wrap.visible{display:block;}
/* SCROLL FIX */
.content{padding:10px 0 80px;}
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <h1>Immeuble 2i</h1>
        <p>2i Immobilier SCI — Palmeraies, Cocody</p>
      </div>
      <div class="form-group">
        <label class="form-label">Identifiant</label>
        <input type="text" id="login-id" placeholder="proprio_diaby" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div style="position:relative;">
          <input type="password" id="login-mdp" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px;">
          <button type="button" onclick="toggleMdp()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;color:var(--gray-400);font-size:16px;padding:0;border-radius:0;" id="btn-eye">👁</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <input type="checkbox" id="remember-me" style="width:16px;height:16px;cursor:pointer;">
        <label for="remember-me" style="font-size:13px;color:var(--gray-500);cursor:pointer;">Se souvenir de moi</label>
      </div>
      <div id="login-err" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none;"></div>
      <button class="btn-primary" onclick="seConnecter()">Se connecter</button>
      <div style="text-align:center;margin-top:16px;">
        <span style="font-size:12px;color:var(--gray-500);">Accès locataire ? </span>
        <button style="background:none;color:var(--blue);font-size:12px;font-weight:600;padding:0;" onclick="afficherPortail()">Portail locataire →</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ APP PROPRIÉTAIRE ═══════════════════ -->
<div id="screen-proprio" class="screen">
  <div class="header">
    <div class="header-top">
      <div>
        <div style="display:flex;align-items:center;gap:8px;">
          <h1>Immeuble 2i</h1>
          <span class="pill pill-blue" style="font-size:10px;">Propriétaire</span>
        </div>
        <div class="header-sub" id="proprio-nom">—</div>
      </div>
      <button class="btn-actualiser" onclick="actualiser()">Actualiser</button>
      <button class="btn-actualiser" onclick="changerProfil()" style="background:rgba(255,255,255,.15);margin-left:6px;">⇄</button>
    </div>
  </div>
  <div class="nav" id="proprio-nav"></div>
  <div class="content" id="proprio-content"></div>
</div>

<!-- ═══════════════════ PORTAIL LOCATAIRE ═══════════════════ -->
<div id="screen-portail" class="screen">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>Portail Locataire</h1>
        <div class="header-sub" id="portail-nom">—</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-actualiser" onclick="deconnecterLocataire()" style="background:rgba(255,255,255,.15);">← Retour</button>
        <button class="btn-actualiser" onclick="changerProfil()">Changer</button>
      </div>
    </div>
  </div>
  <div class="content" id="portail-content"></div>
</div>

<!-- ═══════════════════ MODALS ═══════════════════ -->

<!-- Modal multi-mois -->
<div class="modal-overlay" id="modal-multimois">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mm-titre">Paiement multi-mois</div>
    <input type="hidden" id="mm-idloc">
    <input type="hidden" id="mm-loyer">
    <div class="form-group">
      <label class="form-label">Date de paiement</label>
      <input type="date" id="mm-date">
    </div>
    <div class="form-group">
      <label class="form-label">Mode de paiement</label>
      <select id="mm-mode" onchange="toggleNumTrans('mm')">
        <option value="Mobile Money">Mobile Money</option>
        <option value="Espèces">Espèces</option>
        <option value="Dépôt bancaire">Dépôt bancaire</option>
        <option value="Virement bancaire">Virement bancaire</option>
      </select>
    </div>
    <div class="num-trans-wrap" id="mm-num-wrap">
      <label class="form-label">N° transaction Mobile Money</label>
      <input type="text" id="mm-num-trans" placeholder="Ex: OM-20260506-XXXX">
    </div>
    <div class="form-group">
      <label class="form-label">Mois à couvrir</label>
      <div id="mm-mois-list"></div>
    </div>
    <div class="card" style="background:var(--blue-light);margin-bottom:16px;">
      <div style="font-size:12px;color:var(--blue);font-weight:600;">Total à encaisser</div>
      <div style="font-size:20px;font-weight:700;color:var(--blue);margin-top:4px;" id="mm-total">0 Fr CFA</div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-multimois')">Annuler</button>
      <button class="btn-save" onclick="validerMultiMois()">Valider</button>
    </div>
  </div>
</div>

<!-- Modal dépense -->
<div class="modal-overlay" id="modal-depense">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="dep-titre">Nouvelle dépense</div>
    <input type="hidden" id="dep-caisse">
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select id="dep-cat">
        <option>Salaire gardien</option>
        <option>Eau / Électricité</option>
        <option>Petits travaux</option>
        <option>Gros travaux</option>
        <option>Taxe foncière</option>
        <option>Assurance</option>
        <option>Commission agence</option>
        <option>Autre</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input type="text" id="dep-desc" placeholder="Détail de la dépense">
    </div>
    <div class="form-group">
      <label class="form-label">Montant (Fr CFA)</label>
      <input type="number" id="dep-montant" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input type="text" id="dep-notes" placeholder="Optionnel">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-depense')">Annuler</button>
      <button class="btn-save" onclick="validerDepense()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal travail -->
<div class="modal-overlay" id="modal-travail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="trav-titre">Nouveau travail</div>
    <input type="hidden" id="trav-id">
    <div class="form-group">
      <label class="form-label">Appartement concerné</label>
      <select id="trav-appt">
        <option value="BAT001">Espaces communs / Bâtiment</option>
        <option value="APT-M1">M1</option><option value="APT-M2">M2</option>
        <option value="APT-M3">M3</option><option value="APT-M4">M4</option>
        <option value="APT-10">10</option><option value="APT-11">11</option>
        <option value="APT-12">12</option><option value="APT-13">13</option>
        <option value="APT-20">20</option><option value="APT-21">21</option>
        <option value="APT-30">30</option><option value="APT-31">31</option>
        <option value="APT-02">2</option><option value="APT-14">14</option>
        <option value="APT-V1">V1</option><option value="APT-22">22</option>
        <option value="APT-23">23</option><option value="APT-24">24</option>
        <option value="APT-32">32</option><option value="APT-33">33</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select id="trav-cat">
        <option>Plomberie</option><option>Électricité</option>
        <option>Peinture / réfection</option><option>Climatisation</option>
        <option>Espaces communs</option><option>Toiture</option>
        <option>Gros travaux</option><option>Autre</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="trav-desc" placeholder="Détail des travaux..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Artisan</label>
      <input type="text" id="trav-artisan" placeholder="Nom de l'artisan">
    </div>
    <div class="form-group">
      <label class="form-label">Statut</label>
      <select id="trav-statut">
        <option>Devis</option><option>Négociation</option>
        <option>En cours</option><option>Terminé</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Devis initial (Fr CFA)</label>
      <input type="number" id="trav-devis" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Devis négocié (après réduction)</label>
      <input type="number" id="trav-devis-neg" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Facture finale acceptée</label>
      <input type="number" id="trav-facture" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Note / échange</label>
      <textarea id="trav-notes" placeholder="Ex: réduction de 20% obtenue, acompte versé..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-travail')">Annuler</button>
      <button class="btn-save" onclick="sauvegarderTravail()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ CONFIG ════════════════
const WEBAPP = 'https://script.google.com/macros/s/AKfycbwSNXrahHO0qKUKZRPgxl2uXVX969RDDz3yZKV3JwyagC83tD_8y3JKm5xU-HVbKow8yQ/exec';
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ═══════════════ ÉTAT ════════════════
let session  = null; // { type:'proprio'|'locataire', nom, id }
let locataires = [];
let travaux  = [];

// ═══════════════ API ════════════════
async function get(action, params={}) {
  params.action = action;
  const url = WEBAPP + '?' + new URLSearchParams(params).toString();
  const r = await fetch(url, { redirect:'follow' });
  return r.json();
}

async function post(params) {
  const url = WEBAPP + '?' + new URLSearchParams(params).toString();
  const r = await fetch(url, { redirect:'follow' });
  return r.json();
}

// ═══════════════ UTILS ════════════════
const fmt = n => Math.round(n).toLocaleString('fr-FR');
const ini = s => (s||'').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
const fmtDate = s => { if(!s) return ''; const p=s.toString().split('/'); return p.length===3?p[0]+'/'+p[1]+'/'+p[2]:s; };
const slugVersLabel = slug => { if(!slug||slug.length<6) return slug; const y=slug.slice(0,4),m=parseInt(slug.slice(4,6))-1; return MOIS[m]+' '+y; };
const dateAujourdhui = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const slugDuMois = () => { const d=new Date(); return String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'); };

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleNumTrans(prefix) {
  const mode = document.getElementById(prefix+'-mode').value;
  const wrap = document.getElementById(prefix+'-num-wrap');
  if(wrap) wrap.classList.toggle('visible', mode === 'Mobile Money');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════ LOGIN ════════════════
function toggleMdp() {
  const inp = document.getElementById('login-mdp');
  const btn = document.getElementById('btn-eye');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function chargerIdentifiantsSauvegardes() {
  try {
    const saved = localStorage.getItem('2i_session');
    if (saved) {
      const d = JSON.parse(saved);
      if (d.id)  document.getElementById('login-id').value  = d.id;
      if (d.mdp) document.getElementById('login-mdp').value = d.mdp;
      document.getElementById('remember-me').checked = true;
    }
  } catch(e) {}
}

async function seConnecter() {
  const id  = document.getElementById('login-id').value.trim();
  const mdp = document.getElementById('login-mdp').value.trim();
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!id || !mdp) { err.textContent='Remplissez les deux champs.'; err.style.display='block'; return; }
  const r = await get('authProprio', { id, mdp });
  if (r.success) {
    session = { type:'proprio', nom:r.nom, id };
    // Mémoriser si demandé
    if (document.getElementById('remember-me').checked) {
      try { localStorage.setItem('2i_session', JSON.stringify({ id, mdp })); } catch(e) {}
    } else {
      try { localStorage.removeItem('2i_session'); } catch(e) {}
    }
    document.getElementById('proprio-nom').textContent = r.nom;
    showScreen('screen-proprio');
    await chargerDonnees();
    afficherOnglet('paiements');
  } else {
    err.textContent = 'Identifiants incorrects.';
    err.style.display = 'block';
  }
}

function afficherPortail() { showScreen('screen-portail'); chargerPortailLogin(); }

async function chargerDonnees() {
  const r = await get('getLocataires');
  locataires = r.data || [];
}

async function actualiser() {
  await chargerDonnees();
  const ongletActif = document.querySelector('.nav-item.active');
  if (ongletActif) afficherOnglet(ongletActif.dataset.onglet);
}

// ═══════════════ NAVIGATION ════════════════
const NAV_ITEMS = [
  { id:'paiements', label:'Paiements' },
  { id:'archives',  label:'Archives' },
  { id:'finances',  label:'Finances' },
  { id:'tresorerie',label:'Trésorerie' },
  { id:'messages',  label:'Messages', badge:true },
  { id:'travaux',   label:'Travaux' },
  { id:'artisans',  label:'Artisans' },
];

function renderNav(actif) {
  return NAV_ITEMS.map(n =>
    `<div class="nav-item${n.id===actif?' active':''}" data-onglet="${n.id}" onclick="afficherOnglet('${n.id}')">${n.label}</div>`
  ).join('');
}

function afficherOnglet(id) {
  document.getElementById('proprio-nav').innerHTML = renderNav(id);
  const c = document.getElementById('proprio-content');
  c.innerHTML = `<div style="padding:40px;text-align:center;color:var(--gray-400);">Chargement…</div>`;
  if      (id==='paiements')  chargerPaiements();
  else if (id==='archives')   chargerArchives();
  else if (id==='finances')   chargerFinances();
  else if (id==='tresorerie') chargerTresorerie();
  else if (id==='messages')   chargerMessages();
  else if (id==='travaux')    chargerTravaux();
  else if (id==='artisans')   chargerArtisans();
}

// ═══════════════ PAIEMENTS ════════════════
function chargerPaiements() {
  const payes    = locataires.filter(l=>l.paye);
  const enAttente= locataires.filter(l=>!l.paye);
  const FREQ_REF = { 'APT-M3':'Bimensuel', 'APT-21':'Trimestriel' };

  const totalEnc = payes.reduce((s,l) => s + (l.montantPaye > 0 ? l.montantPaye : l.loyer), 0);
  const pct      = locataires.length ? Math.round(payes.length/locataires.length*100) : 0;

  let h = `<div style="padding:14px;">
    <div class="card-grid">
      <div class="stat-card">
        <div class="stat-label">Encaissé ce mois</div>
        <div class="stat-val">${fmt(totalEnc)}</div>
        <div class="stat-sub">Fr CFA</div>
      </div>
      <div class="stat-card light">
        <div class="stat-label" style="color:var(--gray-500);">Recouvrement</div>
        <div class="stat-val" style="color:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'};">${pct}%</div>
        <div class="stat-sub" style="color:var(--gray-500);">${payes.length}/${locataires.length} locataires</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if (payes.length) {
    h += `<div class="section-title">Payés (${payes.length})</div>`;
    payes.forEach((l,i) => {
      const montant = l.montantPaye > 0 ? l.montantPaye : l.loyer;
      const nbMois  = l.moisCouverts.length;
      const moisLabel = nbMois > 1 ? ` · ${nbMois} mois` : '';
      h += `<div class="loc-card">
        <div class="loc-head">
          <div class="loc-info">
            <div class="avatar av-green">${ini(l.nom+' '+l.prenom)}</div>
            <div>
              <div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
              <div class="loc-sub">Appt ${l.appt} · ${fmt(montant)} Fr${moisLabel} · ${fmtDate(l.datePaie)}</div>
            </div>
          </div>
          <span class="pill pill-green">Payé</span>
        </div>
        <div class="loc-actions">
          <button class="btn-violet" onclick="genererQuittance(${i})">📄 PDF</button>
          <button class="btn-red" onclick="annulerPaiement('${l.id}','${l.nom}')">Annuler</button>
        </div>
      </div>`;
    });
  }

  if (enAttente.length) {
    h += `<div class="section-title">En attente (${enAttente.length})</div>`;
    enAttente.forEach(l => {
      const modeActuel = l.modePaie || 'Mobile Money';
      const opts = ['Mobile Money','Espèces','Dépôt bancaire','Virement bancaire']
        .map(m=>`<option value="${m}"${modeActuel.toUpperCase().replace(/\s+/g,'')=== m.toUpperCase().replace(/\s+/g,'')?' selected':''}>${m}</option>`).join('');
      h += `<div class="loc-card">
        <div class="loc-head">
          <div class="loc-info">
            <div class="avatar av-red">${ini(l.nom+' '+l.prenom)}</div>
            <div>
              <div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
              <div class="loc-sub">Appt ${l.appt} · ${fmt(l.loyer)} Fr CFA</div>
            </div>
          </div>
        </div>
        <div class="loc-actions">
          <select class="mode-select" id="mode-${l.id}" onchange="onModeChange('${l.id}')">${opts}</select>
          <div class="num-trans-wrap${modeActuel==='Mobile Money'?' visible':''}" id="nt-wrap-${l.id}" style="display:${modeActuel==='Mobile Money'?'block':'none'}">
            <input type="text" id="nt-${l.id}" placeholder="N° transaction" style="font-size:12px;padding:5px 8px;border:1px solid var(--gray-200);border-radius:8px;width:140px;">
          </div>
          <button class="btn-blue" onclick="validerPaiement('${l.id}')">✓ Valider</button>
          <button class="btn-violet" onclick="ouvrirMultiMois('${l.id}','${l.nom}','${l.prenom}',${l.loyer},'${modeActuel}')">+ Mois</button>
        </div>
      </div>`;
    });
  }

  h += `<div style="display:flex;gap:8px;margin:16px 10px;">
    <button class="btn-gray" style="flex:1;" onclick="changerProfil()">⇄ Changer de profil</button>
    <button class="btn-red" style="flex:1;" onclick="deconnecterProprio()">Déconnexion</button>
  </div></div>`;
  document.getElementById('proprio-content').innerHTML = h;
}

function onModeChange(idLoc) {
  const mode = document.getElementById('mode-'+idLoc).value;
  const wrap = document.getElementById('nt-wrap-'+idLoc);
  if (wrap) wrap.style.display = mode === 'Mobile Money' ? 'block' : 'none';
}

async function validerPaiement(idLoc) {
  const mode    = document.getElementById('mode-'+idLoc)?.value || 'Mobile Money';
  const numTrans= document.getElementById('nt-'+idLoc)?.value || '';
  const today   = dateAujourdhui();
  const slugMois= slugDuMois();
  const l       = locataires.find(x=>x.id===idLoc);
  if (!l) return;
  const r = await post({ action:'setPaye', idLoc, paye:'true', modePaie:mode,
    moisCouverts:slugMois, montantTotal:l.loyer, datePaiement:today, numTransaction:numTrans });
  if (r.success) { await chargerDonnees(); chargerPaiements(); }
  else alert('Erreur: ' + (r.error||'inconnue'));
}

async function annulerPaiement(idLoc, nom) {
  if (!confirm('Annuler le paiement de '+nom+' ?')) return;
  await post({ action:'setPaye', idLoc, paye:'false', moisCouverts:slugDuMois() });
  await chargerDonnees(); chargerPaiements();
}

// ═══════════════ MULTI-MOIS ════════════════
function ouvrirMultiMois(idLoc, nom, prenom, loyer, modePaie) {
  document.getElementById('mm-idloc').value  = idLoc;
  document.getElementById('mm-loyer').value  = loyer;
  document.getElementById('mm-titre').textContent = 'Multi-mois — '+(nom+(prenom?' '+prenom:''));
  document.getElementById('mm-date').value   = dateAujourdhui();
  // Pré-sélectionner le mode
  const sel = document.getElementById('mm-mode');
  for (let i=0;i<sel.options.length;i++) {
    if (sel.options[i].value.toUpperCase().replace(/\s+/g,'') === (modePaie||'').toUpperCase().replace(/\s+/g,'')) { sel.selectedIndex=i; break; }
  }
  toggleNumTrans('mm');
  // Générer les 6 derniers mois
  const today = new Date();
  const list  = document.getElementById('mm-mois-list');
  list.innerHTML = '';
  for (let i=5;i>=-2;i--) {
    const d    = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const slug = String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0');
    const label= MOIS[d.getMonth()]+' '+d.getFullYear();
    const isPast = i > 0;
    list.innerHTML += `<label class="mois-checkbox">
      <input type="checkbox" class="mois-cb" value="${slug}" onchange="majTotalMM(${loyer})">
      <div><div class="mois-nom">${label}</div>${isPast?'<div class="mois-sub">Mois passé</div>':''}</div>
    </label>`;
  }
  majTotalMM(loyer);
  openModal('modal-multimois');
}

function majTotalMM(loyer) {
  const count = document.querySelectorAll('#mm-mois-list input:checked').length;
  document.getElementById('mm-total').textContent = fmt(loyer*count) + ' Fr CFA';
}

async function validerMultiMois() {
  const idLoc   = document.getElementById('mm-idloc').value;
  const loyer   = parseInt(document.getElementById('mm-loyer').value)||0;
  const mode    = document.getElementById('mm-mode').value;
  const numTrans= document.getElementById('mm-num-trans').value||'';
  const dateVal = document.getElementById('mm-date').value;
  const moisSelec = [...document.querySelectorAll('#mm-mois-list input:checked')].map(c=>c.value);
  if (!moisSelec.length) { alert('Sélectionnez au moins un mois.'); return; }
  const total = loyer * moisSelec.length;
  const dateF = dateVal.split('-').reverse().join('/');
  closeModal('modal-multimois');
  const r = await post({ action:'setPaye', idLoc, paye:'true', modePaie:mode,
    moisCouverts:moisSelec.join(','), montantTotal:total,
    datePaiement:dateF, numTransaction:numTrans });
  if (r.success) {
    // Mettre à jour en mémoire
    const idx = locataires.findIndex(l=>l.id===idLoc);
    if (idx !== -1) {
      locataires[idx].paye = true;
      locataires[idx].montantPaye = total;
      locataires[idx].moisCouverts = moisSelec;
      locataires[idx].datePaie = dateF;
      locataires[idx].modePaieMois = mode;
    }
    chargerPaiements();
  } else { alert('Erreur: '+(r.error||'inconnue')); }
}

// ═══════════════ TRÉSORERIE ════════════════
async function chargerTresorerie() {
  try {
    const r  = await get('getCaisses');
    const d  = r.data || { caisse1:{solde:0,encaissementsMois:0,loyers:[],operations:[]}, caisse2:{solde:0,encaissementsMois:0,loyers:[],operations:[]} };
    const c1 = d.caisse1, c2 = d.caisse2;
    const encC1 = c1.encaissementsMois||0;
    const encC2 = c2.encaissementsMois||0;
    const depC1 = (c1.operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
    const depC2 = (c2.operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
    const totalEnc = encC1+encC2;
    const totalDep = depC1+depC2;
    const solde1   = c1.solde||0;
    const solde2   = c2.solde||0;

    let h = `<div style="padding:14px;">
      <div class="card-grid">
        <div class="card" style="border-left:4px solid var(--green);">
          <div class="stat-label">Caisse 1 — Mobile Money/Espèces</div>
          <div class="stat-val" style="color:${solde1>=0?'var(--green)':'var(--red)'};">${fmt(solde1)}</div>
          <div class="stat-sub">Fr CFA · Maman Diaby</div>
        </div>
        <div class="card" style="border-left:4px solid var(--blue);">
          <div class="stat-label">Caisse 2 — Banque</div>
          <div class="stat-val" style="color:${solde2>=0?'var(--green)':'var(--red)'};">${fmt(solde2)}</div>
          <div class="stat-sub">Fr CFA</div>
        </div>
      </div>
      <div class="card">
        <div class="stat-label">Trésorerie totale</div>
        <div class="stat-val" style="color:var(--green);">${fmt(solde1+solde2)}</div>
        <div class="stat-sub">Fr CFA</div>
      </div>
      <div class="card-grid">
        <div class="card" style="background:var(--green-light);">
          <div class="stat-label">Encaissés Caisse 1</div>
          <div style="font-size:18px;font-weight:700;color:var(--green);">${fmt(encC1)}</div>
          <div class="stat-sub">${(c1.loyers||[]).length} locataire(s)</div>
        </div>
        <div class="card" style="background:var(--blue-light);">
          <div class="stat-label">Encaissés Caisse 2</div>
          <div style="font-size:18px;font-weight:700;color:var(--blue);">${fmt(encC2)}</div>
          <div class="stat-sub">${(c2.loyers||[]).length} locataire(s)</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <button class="btn-primary" style="flex:1;" onclick="ouvrirDepense(1)">+ Dépense Caisse 1</button>
        <button class="btn-primary" style="flex:1;background:var(--blue-dark);" onclick="ouvrirDepense(2)">+ Dépense Banque</button>
      </div>
      <button class="btn-gray" style="width:100%;margin-bottom:16px;" onclick="ouvrirTransfert()">↗ Transfert C1 → Banque</button>`;

    // Loyers Caisse 1
    if ((c1.loyers||[]).length) {
      h += `<div class="trés-section">Caisse 1 — Loyers encaissés ce mois</div><div class="card">`;
      c1.loyers.forEach(op => {
        h += `<div class="op-row"><div><div class="op-label">${op.description}</div><div class="op-sub">${op.date} · ${op.categorie}</div></div><span class="op-val pos">+${fmt(op.entree)}</span></div>`;
      });
      h += `<div class="op-row"><div class="op-label" style="font-weight:700;">Total encaissé Caisse 1</div><span class="op-val pos" style="font-weight:700;">+ ${fmt(encC1)} Fr</span></div></div>`;
    }

    // Dépenses Caisse 1
    if ((c1.operations||[]).length) {
      h += `<div class="trés-section">Caisse 1 — Dépenses et opérations</div><div class="card">`;
      c1.operations.forEach(op => {
        const isE = op.entree > 0;
        h += `<div class="op-row"><div><div class="op-label">${op.description}</div><div class="op-sub">${op.date} · ${op.categorie}</div></div>
          <div style="text-align:right;"><span class="op-val ${isE?'pos':'neg'}">${isE?'+':'- '}${fmt(isE?op.entree:op.sortie)}</span><div class="op-sub">Solde: ${fmt(op.solde)}</div></div></div>`;
      });
      h += `<div class="op-row"><div class="op-label" style="font-weight:700;">Total dépenses Caisse 1</div><span class="op-val neg" style="font-weight:700;">- ${fmt(depC1)} Fr</span></div></div>`;
    }

    // Loyers Caisse 2
    if ((c2.loyers||[]).length) {
      h += `<div class="trés-section">Caisse 2 — Loyers encaissés ce mois</div><div class="card">`;
      c2.loyers.forEach(op => {
        h += `<div class="op-row"><div><div class="op-label">${op.description}</div><div class="op-sub">${op.date} · ${op.categorie}</div></div><span class="op-val pos">+${fmt(op.entree)}</span></div>`;
      });
      h += `<div class="op-row"><div class="op-label" style="font-weight:700;">Total encaissé Caisse 2</div><span class="op-val pos" style="font-weight:700;">+ ${fmt(encC2)} Fr</span></div></div>`;
    }

    // Dépenses Caisse 2
    if ((c2.operations||[]).length) {
      h += `<div class="trés-section">Caisse 2 — Banque — Dépenses et opérations</div><div class="card">`;
      c2.operations.forEach(op => {
        const isE = op.entree > 0;
        h += `<div class="op-row"><div><div class="op-label">${op.description}</div><div class="op-sub">${op.date} · ${op.categorie}</div></div>
          <div style="text-align:right;"><span class="op-val ${isE?'pos':'neg'}">${isE?'+':'- '}${fmt(isE?op.entree:op.sortie)}</span><div class="op-sub">Solde: ${fmt(op.solde)}</div></div></div>`;
      });
      h += `<div class="op-row"><div class="op-label" style="font-weight:700;">Total dépenses Caisse 2</div><span class="op-val neg" style="font-weight:700;">- ${fmt(depC2)} Fr</span></div></div>`;
    }

    // Récapitulatif
    const netMois = totalEnc - totalDep;
    h += `<div class="trés-section">Récapitulatif du mois</div><div class="card">
      <div class="fin-row"><span>Loyers encaissés Caisse 1</span><span class="op-val pos">+ ${fmt(encC1)} Fr</span></div>
      <div class="fin-row"><span>Loyers encaissés Caisse 2</span><span class="op-val pos">+ ${fmt(encC2)} Fr</span></div>
      <div class="fin-row"><span style="font-weight:600;">Total loyers encaissés</span><span class="op-val pos" style="font-weight:700;">+ ${fmt(totalEnc)} Fr</span></div>
      <div class="fin-row"><span>Dépenses Caisse 1</span><span class="op-val neg">- ${fmt(depC1)} Fr</span></div>
      <div class="fin-row"><span>Dépenses Caisse 2</span><span class="op-val neg">- ${fmt(depC2)} Fr</span></div>
      <div class="fin-row"><span style="font-weight:600;">Total dépenses</span><span class="op-val neg" style="font-weight:700;">- ${fmt(totalDep)} Fr</span></div>
      <div class="fin-row"><span style="font-weight:700;">Résultat net du mois</span><span style="font-weight:700;color:${netMois>=0?'var(--green)':'var(--red)'};">${netMois>=0?'+ ':'- '}${fmt(Math.abs(netMois))} Fr</span></div>
      <div class="fin-row"><span>Trésorerie totale</span><span style="font-weight:700;color:var(--blue);">${fmt(solde1+solde2)} Fr</span></div>
    </div></div>`;

    document.getElementById('proprio-content').innerHTML = h;
  } catch(err) {
    document.getElementById('proprio-content').innerHTML = `<div class="erreur">Erreur: ${err.message}</div>`;
  }
}

function ouvrirDepense(caisse) {
  document.getElementById('dep-caisse').value = caisse;
  document.getElementById('dep-titre').textContent = caisse===1 ? 'Dépense Caisse 1' : 'Dépense Banque';
  openModal('modal-depense');
}

async function validerDepense() {
  const caisse  = parseInt(document.getElementById('dep-caisse').value);
  const cat     = document.getElementById('dep-cat').value;
  const desc    = document.getElementById('dep-desc').value;
  const montant = parseInt(document.getElementById('dep-montant').value)||0;
  const notes   = document.getElementById('dep-notes').value;
  if (!montant) { alert('Montant requis.'); return; }
  closeModal('modal-depense');
  await post({ action:'addDepense', caisse, categorie:cat, description:desc, montant, notes });
  chargerTresorerie();
}

function ouvrirTransfert() {
  const m = prompt('Montant à transférer vers la banque (Fr CFA) :');
  if (!m || isNaN(m)) return;
  post({ action:'addTransfert', montant:parseInt(m), notes:'Transfert C1→Banque' }).then(()=>chargerTresorerie());
}

// ═══════════════ ARCHIVES ════════════════
async function chargerArchives() {
  const r    = await get('getHistoriqueComplet');
  const data = r.data || [];
  const today= new Date();
  const moisDispos = [];
  for (let i=5;i>=0;i--) {
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    moisDispos.push({ slug: String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'), label: MOIS[d.getMonth()].substring(0,3)+' '+d.getFullYear() });
  }

  let h = `<div style="padding:14px;">
    <div class="card">
      <div class="stat-label" style="margin-bottom:8px;">Historique des paiements</div>
      <select class="mode-select" id="sel-mois" onchange="filtrerArchive()" style="width:100%;border-radius:10px;padding:8px;">`;
  moisDispos.forEach(m => { h += `<option value="${m.slug}">${slugVersLabel(m.slug)}</option>`; });
  h += `</select></div>
    <div style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;padding:8px 0 6px;">Régularité — 6 derniers mois</div>
    <div class="card" style="overflow-x:auto;">
      <table class="arch-table">
        <tr><th style="text-align:left;">Locataire</th>`;
  moisDispos.forEach(m => { h += `<th>${m.label}</th>`; });
  h += `<th>Score</th></tr>`;

  data.forEach(loc => {
    const nb   = loc.moisPaies.length;
    const score= Math.round(nb/6*100);
    h += `<tr><td>${loc.nom}<br><span style="font-size:10px;color:var(--gray-500);">Appt ${loc.appt}</span></td>`;
    moisDispos.forEach(m => {
      const ok = loc.moisPaies.indexOf(m.slug) !== -1;
      h += `<td>${ok ? '✅' : '❌'}</td>`;
    });
    h += `<td style="font-weight:700;color:${score>=80?'var(--green)':score>=50?'var(--amber)':'var(--red)'};">${score}%</td></tr>`;
  });
  h += `</table></div></div>`;
  document.getElementById('proprio-content').innerHTML = h;
}

// ═══════════════ TRAVAUX ════════════════
async function chargerTravaux() {
  const r = await get('getTravaux');
  travaux = r.data || [];
  const enCours  = travaux.filter(t=>t.statut!=='Terminé');
  const termines = travaux.filter(t=>t.statut==='Terminé');

  let h = `<div style="padding:14px;">
    <button class="btn-primary" style="margin-bottom:14px;" onclick="ouvrirNouveauTravail()">+ Nouveau travail</button>`;

  if (enCours.length) {
    h += `<div class="section-title">En cours & Devis (${enCours.length})</div>`;
    enCours.forEach(t => h += travailCard(t));
  }
  if (termines.length) {
    h += `<div class="section-title">Terminés (${termines.length})</div>`;
    termines.forEach(t => h += travailCard(t));
  }
  if (!travaux.length) h += `<div class="card" style="text-align:center;color:var(--gray-400);padding:40px;">Aucun travail enregistré</div>`;
  h += `</div>`;
  document.getElementById('proprio-content').innerHTML = h;
}

function travailCard(t) {
  const pc = t.statut==='Terminé'?'pill-green':t.statut==='En cours'?'pill-amber':t.statut==='Négociation'?'pill-violet':'pill-blue';
  const montantRef = t.factureFinale||t.devisNegocie||t.devis||0;
  const red = t.devis&&t.devisNegocie ? Math.round((1-t.devisNegocie/t.devis)*100) : 0;
  const montantLabel = t.factureFinale ? fmt(t.factureFinale)+' Fr (facture)' : t.devisNegocie ? fmt(t.devisNegocie)+' Fr (négocié)' : fmt(t.devis)+' Fr (devis)';
  const lastNote = t.notes ? t.notes.split('\n').pop() : '';
  return `<div class="travail-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${t.desc||'Sans description'}</div>
        <div style="font-size:11px;color:var(--gray-500);margin-top:2px;">${t.idAppt!=='BAT001'?'Appt '+t.idAppt+' · ':''}${t.categorie||''}${t.artisan?' · '+t.artisan:''}</div>
      </div>
      <span class="pill ${pc}">${t.statut}</span>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${montantLabel}${red>0?' <span style="color:var(--green);font-size:11px;">(-'+red+'%)</span>':''}</div>
    ${lastNote?`<div style="font-size:11px;color:var(--gray-500);background:var(--gray-50);padding:6px 8px;border-radius:6px;margin-bottom:8px;">${lastNote}</div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-violet" onclick="ouvrirEditerTravail('${t.id}')">✏️ Modifier</button>
      ${t.statut!=='Terminé'?`<button class="btn-green" onclick="terminerTravail('${t.id}')">✓ Terminer</button>`:''}
    </div>
  </div>`;
}

function ouvrirNouveauTravail() {
  document.getElementById('trav-titre').textContent = 'Nouveau travail';
  document.getElementById('trav-id').value = '';
  ['trav-desc','trav-artisan','trav-notes'].forEach(id=>{document.getElementById(id).value='';});
  ['trav-devis','trav-devis-neg','trav-facture'].forEach(id=>{document.getElementById(id).value='';});
  openModal('modal-travail');
}

function ouvrirEditerTravail(id) {
  const t = travaux.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('trav-titre').textContent = 'Modifier le travail';
  document.getElementById('trav-id').value = id;
  document.getElementById('trav-desc').value = t.desc||'';
  document.getElementById('trav-artisan').value = t.artisan||'';
  document.getElementById('trav-statut').value = t.statut||'Devis';
  document.getElementById('trav-devis').value = t.devis||'';
  document.getElementById('trav-devis-neg').value = t.devisNegocie||'';
  document.getElementById('trav-facture').value = t.factureFinale||'';
  document.getElementById('trav-notes').value = '';
  openModal('modal-travail');
}

async function sauvegarderTravail() {
  const id   = document.getElementById('trav-id').value;
  const data = {
    idAppt:        document.getElementById('trav-appt').value,
    categorie:     document.getElementById('trav-cat').value,
    desc:          document.getElementById('trav-desc').value,
    artisan:       document.getElementById('trav-artisan').value,
    statut:        document.getElementById('trav-statut').value,
    devis:         parseInt(document.getElementById('trav-devis').value)||0,
    devisNegocie:  parseInt(document.getElementById('trav-devis-neg').value)||0,
    factureFinale: parseInt(document.getElementById('trav-facture').value)||0,
    notes:         document.getElementById('trav-notes').value,
  };
  closeModal('modal-travail');
  if (id) await post({ action:'updateTravail', idTrav:id, data:JSON.stringify(data) });
  else    await post({ action:'addTravail', data:JSON.stringify(data) });
  const r = await get('getTravaux'); travaux = r.data||[];
  chargerTravaux();
}

async function terminerTravail(id) {
  const facture = prompt('Montant facture finale (Fr CFA) :');
  if (facture===null) return;
  await post({ action:'updateTravail', idTrav:id, data:JSON.stringify({ statut:'Terminé', factureFinale:parseInt(facture)||0, dateFin:dateAujourdhui() }) });
  const r = await get('getTravaux'); travaux = r.data||[];
  chargerTravaux();
}

// ═══════════════ ARTISANS ════════════════
async function chargerArtisans() {
  const r = await get('getArtisans');
  const arts = r.data || [];
  let h = `<div style="padding:14px;">
    <button class="btn-primary" style="margin-bottom:14px;" onclick="ajouterArtisan()">+ Ajouter artisan</button>`;
  if (!arts.length) {
    h += `<div class="card" style="text-align:center;color:var(--gray-400);padding:40px;">Aucun artisan enregistré</div>`;
  } else {
    arts.forEach(a => {
      h += `<div class="card">
        <div style="font-size:14px;font-weight:600;">${a.nom}</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:4px;">${a.metier} · ${a.tel}</div>
        ${a.note?`<div style="margin-top:6px;"><span class="pill pill-amber">★ ${a.note}/5</span></div>`:''}
        ${a.obs?`<div style="font-size:12px;color:var(--gray-500);margin-top:6px;">${a.obs}</div>`:''}
      </div>`;
    });
  }
  h += `</div>`;
  document.getElementById('proprio-content').innerHTML = h;
}

async function ajouterArtisan() {
  const nom    = prompt('Nom de l\'artisan :'); if (!nom) return;
  const metier = prompt('Métier :'); if (!metier) return;
  const tel    = prompt('Téléphone :') || '';
  const note   = parseFloat(prompt('Note /5 (0 si inconnu) :')) || 0;
  await post({ action:'addArtisan', data:JSON.stringify({ nom, metier, tel, note }) });
  chargerArtisans();
}

// ═══════════════ PORTAIL LOCATAIRE ════════════════
async function chargerPortailLogin() {
  document.getElementById('portail-content').innerHTML = `<div style="padding:24px;">
    <div class="card">
      <div class="modal-title">Accès locataire</div>
      <div class="form-group"><label class="form-label">Identifiant</label><input type="text" id="p-id" placeholder="Ex: loc_m1"></div>
      <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="p-mdp"></div>
      <div id="p-err" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none;"></div>
      <button class="btn-primary" onclick="connecterLocataire()">Accéder</button>
    </div>
  </div>`;
}

async function connecterLocataire() {
  const id  = document.getElementById('p-id').value.trim();
  const mdp = document.getElementById('p-mdp').value.trim();
  const r   = await get('getPortail', { id, mdp });
  if (r.success) {
    session = { type:'locataire', id:r.idLoc, nom:r.nom, appt:r.appt };
    document.getElementById('portail-nom').textContent = r.nom + ' — Appt ' + r.appt;
    chargerPortailDashboard();
  } else {
    document.getElementById('p-err').textContent = 'Identifiants incorrects.';
    document.getElementById('p-err').style.display = 'block';
  }
}

async function chargerPortailDashboard() {
  const r    = await get('getHistorique', { id:session.id });
  const hist = r.data || [];
  const today= new Date();
  const slugMois = String(today.getFullYear())+String(today.getMonth()+1).padStart(2,'0');
  const payeMois = hist.find(p=>p.moisSlug===slugMois);

  let h = `<div style="padding:14px;">
    <div class="card ${payeMois?'':'card-red'}" style="border-left:4px solid ${payeMois?'var(--green)':'var(--red)'};">
      <div style="font-size:13px;font-weight:600;color:${payeMois?'var(--green)':'var(--red)'};">
        ${payeMois?'✅ Loyer du mois payé':'⚠ Loyer du mois en attente'}
      </div>
      ${payeMois?`<div style="font-size:12px;color:var(--gray-500);margin-top:4px;">${fmt(payeMois.montant)} Fr · ${payeMois.mode} · ${payeMois.datePaie}</div>`:''}
    </div>
    <div class="section-title">Historique des paiements</div>`;

  if (!hist.length) {
    h += `<div class="card" style="text-align:center;color:var(--gray-400);">Aucun paiement enregistré</div>`;
  } else {
    hist.reverse().forEach(p => {
      h += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:14px;font-weight:600;">${slugVersLabel(p.moisSlug)}</div>
            <div style="font-size:12px;color:var(--gray-500);">${p.datePaie} · ${p.mode}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:15px;font-weight:700;color:var(--green);">${fmt(p.montant)} Fr</div>
            <button class="btn-violet" style="margin-top:4px;font-size:11px;padding:4px 10px;" onclick="telechargerQuittanceLocataire('${p.moisSlug}')">📄 PDF</button>
          </div>
        </div>
      </div>`;
    });
  }
  h += `</div>`;
  document.getElementById('portail-content').innerHTML = h;
}

async function telechargerQuittanceLocataire(moisSlug) {
  alert('Quittance '+slugVersLabel(moisSlug)+' — fonctionnalité PDF en cours de déploiement.');
}
// Charger identifiants sauvegardés au démarrage
window.addEventListener('DOMContentLoaded', chargerIdentifiantsSauvegardes);
</script>
