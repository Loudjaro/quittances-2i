<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Immeuble 2i</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --blue:#1a56db; --blue-dark:#1e429f; --blue-light:#ebf5ff;
  --green:#057a55; --green-light:#f3faf7;
  --red:#e02424; --red-light:#fdf2f2;
  --amber:#d97706; --amber-light:#fffbeb;
  --violet:#7e3af2; --violet-light:#f5f3ff;
  --gray-900:#111827; --gray-700:#374151; --gray-500:#6b7280;
  --gray-400:#9ca3af; --gray-200:#e5e7eb; --gray-100:#f3f4f6; --gray-50:#f9fafb;
  --white:#ffffff; --radius:14px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}
.header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:white;padding:16px 16px 12px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:18px;font-weight:700;}
.header-sub{font-size:12px;opacity:.75;margin-top:2px;}
.btn-actualiser{background:rgba(255,255,255,.2);color:white;border:1.5px solid rgba(255,255,255,.4);padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;}
.nav{display:flex;background:var(--white);border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;position:sticky;top:72px;z-index:99;}
.nav::-webkit-scrollbar{display:none;}
.nav-item{flex-shrink:0;padding:12px 14px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--blue);color:white;border-radius:var(--radius);padding:16px;}
.stat-card.light{background:var(--white);border:1px solid var(--gray-200);color:var(--gray-900);}
.stat-label{font-size:11px;opacity:.8;margin-bottom:4px;font-weight:500;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.stat-sub{font-size:11px;opacity:.7;margin-top:2px;}
.progress-bar{height:6px;background:var(--gray-200);border-radius:3px;margin:10px 0;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--violet));}
.section-title{font-size:11px;font-weight:700;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;padding:12px 16px 6px;}
.loc-card{background:var(--white);border-radius:var(--radius);margin:0 10px 8px;padding:14px;box-shadow:var(--shadow);}
.loc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.loc-info{display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.av-green{background:#d1fae5;color:#065f46;}
.av-red{background:#fee2e2;color:#991b1b;}
.av-amber{background:#fef3c7;color:#92400e;}
.loc-nom{font-size:14px;font-weight:600;}
.loc-sub{font-size:11px;color:var(--gray-500);margin-top:2px;}
.loc-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.pill{display:inline-flex;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.pill-green{background:var(--green-light);color:var(--green);}
.pill-red{background:var(--red-light);color:var(--red);}
.pill-amber{background:var(--amber-light);color:var(--amber);}
.pill-blue{background:var(--blue-light);color:var(--blue);}
.pill-violet{background:var(--violet-light);color:var(--violet);}
button{cursor:pointer;border:none;border-radius:99px;font-weight:600;transition:opacity .15s;}
button:active{opacity:.7;}
.btn-primary{background:var(--blue);color:white;padding:10px 18px;font-size:13px;width:100%;}
.btn-blue{background:var(--blue);color:white;padding:7px 14px;font-size:12px;}
.btn-red{background:var(--red-light);color:var(--red);padding:7px 14px;font-size:12px;}
.btn-violet{background:var(--violet-light);color:var(--violet);padding:7px 14px;font-size:12px;}
.btn-green{background:var(--green-light);color:var(--green);padding:7px 14px;font-size:12px;}
.btn-amber{background:var(--amber-light);color:var(--amber);padding:7px 14px;font-size:12px;}
.btn-gray{background:var(--gray-100);color:var(--gray-700);padding:7px 14px;font-size:12px;}
.btn-save{background:var(--blue);color:white;padding:12px 24px;font-size:14px;flex:1;}
.btn-cancel{background:var(--gray-100);color:var(--gray-700);padding:12px 24px;font-size:14px;flex:1;}
.mode-select{font-size:12px;padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:99px;background:var(--white);color:var(--gray-700);cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;background:var(--white);}
.form-group textarea{min-height:80px;resize:vertical;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.op-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.op-row:last-child{border-bottom:none;}
.op-label{font-size:13px;font-weight:500;}
.op-sub{font-size:11px;color:var(--gray-500);margin-top:2px;}
.op-val.pos{color:var(--green);font-weight:600;font-size:13px;}
.op-val.neg{color:var(--red);font-weight:600;font-size:13px;}
.arch-table{width:100%;border-collapse:collapse;font-size:11px;}
.arch-table th{background:var(--gray-100);padding:6px 4px;text-align:center;font-weight:600;font-size:10px;}
.arch-table td{padding:5px 4px;text-align:center;border-bottom:1px solid var(--gray-100);}
.arch-table td:first-child{text-align:left;font-weight:500;}
.fin-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.fin-row:last-child{border-bottom:none;}
.travail-card{background:var(--white);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,var(--blue-dark),var(--blue));}
.login-card{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{width:80px;height:auto;margin-bottom:8px;}
.login-logo h1{font-size:22px;font-weight:800;color:var(--blue);}
.login-logo p{font-size:12px;color:var(--gray-500);margin-top:4px;}
.mois-checkbox{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);cursor:pointer;}
.mois-cb{width:20px;height:20px;}
.solde-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;}
.content{padding:10px 0 80px;}
</style>
</head>

<div class="modal-overlay" id="modal-travail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="trav-titre">Nouveau travail</div>
    <input type="hidden" id="trav-id">
    <div class="form-group"><label class="form-label">Appartement</label>
      <select id="trav-appt">
        <option value="BAT001">Espaces communs / Bâtiment</option>
        <option value="APT-M1">M1</option><option value="APT-M2">M2</option><option value="APT-M3">M3</option><option value="APT-M4">M4</option>
        <option value="APT-10">10</option><option value="APT-11">11</option><option value="APT-12">12</option><option value="APT-13">13</option>
        <option value="APT-20">20</option><option value="APT-21">21</option><option value="APT-30">30</option><option value="APT-31">31</option>
        <option value="APT-02">2</option><option value="APT-14">14</option><option value="APT-V1">V1</option><option value="APT-22">22</option>
        <option value="APT-23">23</option><option value="APT-24">24</option><option value="APT-32">32</option><option value="APT-33">33</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Catégorie</label>
      <select id="trav-cat"><option>Plomberie</option><option>Électricité</option><option>Peinture / réfection</option><option>Climatisation</option><option>Espaces communs</option><option>Toiture</option><option>Gros travaux</option><option>Autre</option></select>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="trav-desc"></textarea></div>
    <div class="form-group"><label class="form-label">Artisan</label><input type="text" id="trav-artisan"></div>
    <div class="form-group"><label class="form-label">Statut</label>
      <select id="trav-statut"><option>Devis</option><option>Négociation</option><option>En cours</option><option>Terminé</option></select>
    </div>
    <div class="form-group"><label class="form-label">Devis initial (Fr CFA)</label><input type="number" id="trav-devis"></div>
    <div class="form-group"><label class="form-label">Devis négocié</label><input type="number" id="trav-devis-neg"></div>
    <div class="form-group"><label class="form-label">Facture finale</label><input type="number" id="trav-facture"></div>
    <div class="form-group"><label class="form-label">Note / échange</label><textarea id="trav-notes"></textarea></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-travail')">Annuler</button>
      <button class="btn-save" onclick="sauvegarderTravail()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal lettre -->
<div class="modal-overlay" id="modal-lettre">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Générer une lettre</div>
    <input type="hidden" id="let-idloc">
    <div class="form-group"><label class="form-label">Type de lettre</label>
      <select id="let-type">
        <option value="relance">Lettre de relance (retard de paiement)</option>
        <option value="demeure">Mise en demeure (retard supérieur à 30 jours)</option>
        <option value="conge">Congé / fin de bail (préavis 2 mois)</option>
      </select>
    </div>
    <div class="form-group" id="let-date-wrap" style="display:none;">
      <label class="form-label">Date de fin de bail souhaitée</label>
      <input type="date" id="let-date-fin">
    </div>
    <div class="form-group"><label class="form-label">Motif complémentaire (optionnel)</label><textarea id="let-motif"></textarea></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-lettre')">Annuler</button>
      <button class="btn-save" onclick="genererLettre()">Générer PDF</button>
    </div>
  </div>
</div>

async function get(action, params={}) {
  params.action = action;
  const r = await fetch(WEBAPP + '?' + new URLSearchParams(params).toString(), { redirect:'follow' });
  return r.json();
}
const post = get.bind(null);
async function api(params) {
  const r = await fetch(WEBAPP + '?' + new URLSearchParams(params).toString(), { redirect:'follow' });
  return r.json();
}

const fmt = n => Math.round(n).toLocaleString('fr-FR');
const ini = s => (s||'').split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
const fmtDate = s => s ? s.toString() : '';
const slugVersLabel = slug => { if(!slug||slug.length<6) return slug; return MOIS[parseInt(slug.slice(4,6))-1]+' '+slug.slice(0,4); };
const dateAuj = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const slugDuMois = () => { const d=new Date(); return String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'); };
const dateFR = () => new Date().toLocaleDateString('fr-FR');

}

}
function chargerIdentifiants() {
  try {
    const s = localStorage.getItem('2i_session');
    if (s) { const d=JSON.parse(s);
      if(d.id) document.getElementById('login-id').value=d.id;
      if(d.mdp) document.getElementById('login-mdp').value=d.mdp;
      document.getElementById('remember-me').checked=true; }
  } catch(e){}
}
window.addEventListener('DOMContentLoaded', chargerIdentifiants);

// ═══════ LOGIN ═══════
async function seConnecter() {
  const id=document.getElementById('login-id').value.trim();
  const mdp=document.getElementById('login-mdp').value.trim();
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!id||!mdp){err.textContent='Remplissez les deux champs.';err.style.display='block';return;}
  const r=await get('authProprio',{id,mdp});
  if(r.success){
    session={type:'proprio',nom:r.nom,id};
    if(document.getElementById('remember-me').checked){
      try{localStorage.setItem('2i_session',JSON.stringify({id,mdp}));}catch(e){}
    } else { try{localStorage.removeItem('2i_session');}catch(e){} }
    document.getElementById('proprio-nom').textContent=r.nom;
    showScreen('screen-proprio');
    await chargerDonnees();
    afficherOnglet('paiements');
  } else {
    err.textContent='Identifiants incorrects.';err.style.display='block';
  }
}

}

function soldeBadge(solde){
  if(solde>0)return '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--red-light);color:var(--red);">Dette '+fmt(solde)+' Fr</span>';
  if(solde<0)return '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--green-light);color:var(--green);">Avance '+fmt(-solde)+' Fr</span>';
  return '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--gray-100);color:var(--gray-500);">À jour</span>';
}

const NAV_ITEMS=[
  {id:'paiements',label:'Paiements'},
  {id:'archives',label:'Archives'},{id:'finances',label:'Finances'},
  {id:'tresorerie',label:'Trésorerie'},
  {id:'travaux',label:'Travaux'},{id:'artisans',label:'Artisans'}
];
function renderNav(actif){
  return NAV_ITEMS.map(n=>`<div class="nav-item${n.id===actif?' active':''}" data-onglet="${n.id}" onclick="afficherOnglet('${n.id}')">${n.label}</div>`).join('');
}
function afficherOnglet(id){
  document.getElementById('proprio-nav').innerHTML=renderNav(id);
  document.getElementById('proprio-content').innerHTML='<div style="padding:40px;text-align:center;color:var(--gray-400);">Chargement…</div>';
  if(id==='paiements')chargerPaiements();
  else if(id==='archives')chargerArchives();
  else if(id==='finances')chargerFinances();
  else if(id==='tresorerie')chargerTresorerie();
  else if(id==='travaux')chargerTravaux();
  else if(id==='artisans')chargerArtisans();
}

// ═══════ PAIEMENTS ═══════
function soldeBadge(solde){
  if(solde>0)return `<span class="solde-badge" style="background:var(--red-light);color:var(--red);">Dette ${fmt(solde)} Fr</span>`;
  if(solde<0)return `<span class="solde-badge" style="background:var(--green-light);color:var(--green);">Avance ${fmt(-solde)} Fr</span>`;
  return `<span class="solde-badge" style="background:var(--gray-100);color:var(--gray-500);">À jour</span>`;
}

function chargerPaiements(){
  const payes=locataires.filter(l=>l.paye);
  const enAttente=locataires.filter(l=>!l.paye);
  const totalEnc=payes.reduce((s,l)=>s+(l.montantPaye||0),0);
  const pct=locataires.length?Math.round(payes.length/locataires.length*100):0;
  const totalDettes=locataires.reduce((s,l)=>s+Math.max(0,l.solde||0),0);

  let h=`<div style="padding:14px;">
    <div class="card-grid">
      <div class="stat-card"><div class="stat-label">Encaissé ce mois</div><div class="stat-val">${fmt(totalEnc)}</div><div class="stat-sub">Fr CFA</div></div>
      <div class="stat-card light"><div class="stat-label" style="color:var(--gray-500);">Recouvrement</div>
        <div class="stat-val" style="color:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'};">${pct}%</div>
        <div class="stat-sub" style="color:var(--gray-500);">${payes.length}/${locataires.length} locataires</div></div>
    </div>

    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${totalDettes>0?'<div class="card" style="background:var(--red-light);border-left:4px solid var(--red);padding:12px;"><div style="font-size:13px;color:var(--red);font-weight:600;">Impayés cumulés : '+fmt(totalDettes)+' Fr CFA</div></div>':''}`;

  if(payes.length){
    h+=`<div class="section-title">Payés ce mois (${payes.length})</div>`;
    payes.forEach((l,i)=>{
      const nbM=l.moisCouverts.length;
      h+=`<div class="loc-card">
        <div class="loc-head">
          <div class="loc-info">
            <div class="avatar av-green">${ini(l.nom+' '+l.prenom)}</div>
            <div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
            <div class="loc-sub">Appt ${l.appt} · ${fmt(l.montantPaye)} Fr${nbM>1?' · '+nbM+' mois':''} · ${l.datePaie}</div></div>
          </div>
          ${soldeBadge(l.solde)}
        </div>
        <div class="loc-actions">
          <button class="btn-violet" onclick="genererQuittance('${l.id}')">📄 Quittance</button>
          <button class="btn-red" onclick="annulerPaiement('${l.id}','${l.nom}')">Annuler</button>
        </div>
      </div>`;
    });
  }

  if(enAttente.length){
    h+=`<div class="section-title">En attente (${enAttente.length})</div>`;
    enAttente.forEach(l=>{
      const avClass='av-amber';
      h+=`<div class="loc-card">
        <div class="loc-head">
          <div class="loc-info">
            <div class="avatar ${avClass}">${ini(l.nom+' '+l.prenom)}</div>
            <div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
            <div class="loc-sub">Appt ${l.appt} · Loyer ${fmt(l.loyer)} Fr · ${l.frequence}</div></div>
          </div>
          ${soldeBadge(l.solde)}
        </div>
        <div class="loc-actions">
          <button class="btn-blue" onclick="ouvrirPaiement('${l.id}')">💰 Paiement</button>
        </div>
      </div>`;
    });
  }

  h+=`<div style="display:flex;gap:8px;margin:16px 10px;">
    <button class="btn-gray" style="flex:1;" onclick="changerProfil()">⇄ Changer de profil</button>
    <button class="btn-red" style="flex:1;" onclick="changerProfil()">Déconnexion</button>
  </div></div>`;
  document.getElementById('proprio-content').innerHTML=h;
}

// ═══════ MODAL PAIEMENT ═══════
function ouvrirPaiement(idLoc){
  const l=locataires.find(x=>x.id===idLoc);
  if(!l)return;
  document.getElementById('pm-idloc').value=idLoc;
  document.getElementById('pm-loyer').value=l.loyer;
  document.getElementById('pm-titre').textContent='Paiement — '+l.nom+(l.prenom?' '+l.prenom:'');
  document.getElementById('pm-date').value=dateAuj();
  const sel=document.getElementById('pm-mode');
  for(let i=0;i<sel.options.length;i++){
    if(sel.options[i].value.toUpperCase().replace(/\s+/g,'')===(l.modePaie||'').toUpperCase().replace(/\s+/g,'')){sel.selectedIndex=i;break;}
  }
  togglePmNum();
  const today=new Date();
  const list=document.getElementById('pm-mois-list');
  list.innerHTML='';
  // 6 mois en arrière + mois courant + jusqu'à décembre de l'année + 3 mois suivants
  const finAnnee = 12 - today.getMonth() - 1; // mois restants dans l'année
  const moisAvant = 6;
  const moisApres = finAnnee + 3; // fin d'année + 3 mois de l'année suivante
  for(let i=moisAvant;i>=-moisApres;i--){
    const d=new Date(today.getFullYear(),today.getMonth()-i,1);
    const slug=String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0');
    const checked=(i===0)?' checked':'';
    const isPast=i>0;
    const isFuture=i<0;
    list.innerHTML+=`<label class="mois-checkbox"><input type="checkbox" class="mois-cb" value="${slug}"${checked} onchange="majMontantPm()">
      <div><div style="font-size:14px;font-weight:500;">${MOIS[d.getMonth()]} ${d.getFullYear()}</div>
      ${isPast?'<div style="font-size:10px;color:var(--red);">Mois passé</div>':''}
      ${isFuture?'<div style="font-size:10px;color:var(--blue);">Avance</div>':''}
      </div></label>`;
  }
  majMontantPm();
  openModal('modal-paiement');
}

function majMontantPm(){
  const loyer=parseInt(document.getElementById('pm-loyer').value)||0;
  const count=document.querySelectorAll('#pm-mois-list input:checked').length;
  document.getElementById('pm-montant').value=loyer*count;
  document.getElementById('pm-info').textContent=count+' mois × '+fmt(loyer)+' Fr = '+fmt(loyer*count)+' Fr CFA attendus';
}

async function validerPaiementModal(){
  const idLoc=document.getElementById('pm-idloc').value;
  const mode=document.getElementById('pm-mode').value;
  const numT=document.getElementById('pm-num').value||'';
  const dateV=document.getElementById('pm-date').value;
  const montant=parseInt(document.getElementById('pm-montant').value)||0;
  const mois=[...document.querySelectorAll('#pm-mois-list input:checked')].map(c=>c.value);
  if(!mois.length){alert('Sélectionnez au moins un mois.');return;}
  if(!montant){alert('Montant requis.');return;}
  closeModal('modal-paiement');
  const dateF=dateV.split('-').reverse().join('/');
  const r=await api({action:'setPaye',idLoc,paye:'true',modePaie:mode,
    moisCouverts:mois.join(','),montantTotal:montant,datePaiement:dateF,numTransaction:numT});
  if(r.success){await chargerDonnees();chargerPaiements();}
  else alert('Erreur: '+(r.error||'inconnue'));
}

async function annulerPaiement(idLoc,nom){
  if(!confirm('Annuler le(s) paiement(s) du mois de '+nom+' ?'))return;
  await api({action:'setPaye',idLoc,paye:'false'});
  await chargerDonnees();chargerPaiements();
}

// ═══════ COMPTES LOCATAIRES ═══════
async function chargerComptes(){
  let h=`<div style="padding:14px;"><div class="section-title" style="padding-left:0;">Situation des comptes locataires</div>`;
  const sorted=[...locataires].sort((a,b)=>(b.solde||0)-(a.solde||0));
  sorted.forEach(l=>{
    h+=`<div class="loc-card" style="margin:0 0 8px;">
      <div class="loc-head" style="margin-bottom:0;">
        <div class="loc-info">
          <div class="avatar ${l.solde>0?'av-red':l.solde<0?'av-green':'av-amber'}">${ini(l.nom+' '+l.prenom)}</div>
          <div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
          <div class="loc-sub">Appt ${l.appt} · Loyer ${fmt(l.loyer)} Fr</div></div>
        </div>
        <div style="text-align:right;">
          ${soldeBadge(l.solde)}
          <div style="margin-top:6px;"><button class="btn-violet" style="font-size:11px;padding:4px 10px;" onclick="voirCompte('${l.id}')">Détail</button></div>
        </div>
      </div>
      <div id="compte-${l.id}"></div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('proprio-content').innerHTML=h;
}

async function voirCompte(idLoc){
  const div=document.getElementById('compte-'+idLoc);
  if(div.innerHTML){div.innerHTML='';return;}
  div.innerHTML='<div style="padding:10px;color:var(--gray-400);font-size:12px;">Chargement…</div>';
  const r=await get('getCompte',{idLoc});
  const c=r.data||{ledger:[]};
  let h=`<div style="margin-top:10px;border-top:1px solid var(--gray-100);padding-top:8px;max-height:300px;overflow-y:auto;">`;
  c.ledger.slice(-15).forEach(op=>{
    h+=`<div class="op-row" style="padding:6px 0;">
      <div><div style="font-size:12px;">${op.libelle}</div><div class="op-sub">${op.date}</div></div>
      <div style="text-align:right;">
        ${op.debit?`<span class="op-val neg">−${fmt(op.debit)}</span>`:`<span class="op-val pos">+${fmt(op.credit)}</span>`}
        <div class="op-sub">Solde: ${op.solde>0?'−':''}${fmt(Math.abs(op.solde))}</div>
      </div></div>`;
  });
  h+=`</div>`;
  div.innerHTML=h;
}
</script>

// ═══════ QUITTANCE avec SITUATION DU COMPTE ═══════
function genererQuittance(idLoc){
  const l=locataires.find(x=>x.id===idLoc);
  if(!l)return;
  // Trouver les mois couverts — fallback sur le mois courant si absent
  if(!l.moisCouverts||!l.moisCouverts.length) l.moisCouverts=[slugDuMois()];
  if(!l.montantPaye) l.montantPaye = l.loyer * l.moisCouverts.length;

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,margin=15;
  const nbM=l.moisCouverts.length;
  const moisLabel=nbM===1?slugVersLabel(l.moisCouverts[0]):slugVersLabel(l.moisCouverts[0])+' à '+slugVersLabel(l.moisCouverts[nbM-1]);

  pdfHeader(doc,W,margin);
  if(nbM>1){
    doc.setFillColor(255,255,255);doc.roundedRect(W-margin-36,9,36,10,3,3,'F');
    doc.setTextColor(26,86,219);doc.setFontSize(9);doc.setFont(undefined,'bold');
    doc.text(nbM+' mois',W-margin-18,15.5,{align:'center'});
  }

  doc.setTextColor(17,24,39);doc.setFontSize(15);doc.setFont(undefined,'bold');
  doc.text('QUITTANCE DE LOYER',margin,55);
  doc.setFontSize(10);doc.setFont(undefined,'normal');doc.setTextColor(107,114,128);
  doc.text('Période : '+moisLabel,margin,62);
  doc.setDrawColor(26,86,219);doc.setLineWidth(0.5);doc.line(margin,66,W-margin,66);

  const infoY=72;
  doc.setFillColor(243,244,246);
  doc.rect(margin,infoY-3,(W-2*margin)/2-4,26,'F');
  doc.rect(W/2+3,infoY-3,(W-2*margin)/2-4,26,'F');
  doc.setFontSize(8);doc.setFont(undefined,'bold');doc.setTextColor(26,86,219);
  doc.text('BAILLEUR',margin+3,infoY+3);
  doc.setFont(undefined,'normal');doc.setTextColor(17,24,39);doc.setFontSize(10);
  doc.text('Madame Diaby Djeneba',margin+3,infoY+10);
  doc.setFontSize(8);doc.setTextColor(107,114,128);
  doc.text('2i Immobilier SCI — Palmeraies, Cocody',margin+3,infoY+16);
  doc.setFontSize(8);doc.setFont(undefined,'bold');doc.setTextColor(26,86,219);
  doc.text('LOCATAIRE',W/2+6,infoY+3);
  doc.setFont(undefined,'normal');doc.setTextColor(17,24,39);doc.setFontSize(10);
  doc.text(l.nom+(l.prenom?' '+l.prenom:''),W/2+6,infoY+10);
  doc.setFontSize(8);doc.setTextColor(107,114,128);
  doc.text('Appartement '+l.appt+' — Immeuble 2i',W/2+6,infoY+16);

  // Tableau loyers
  const tabY=infoY+32;
  doc.setFillColor(26,86,219);doc.rect(margin,tabY,W-2*margin,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont(undefined,'bold');
  doc.text('Désignation',margin+3,tabY+5.5);
  doc.text('Montant (Fr CFA)',W-margin-3,tabY+5.5,{align:'right'});
  let y0=tabY+8;
  l.moisCouverts.forEach((slug,si)=>{
    if(si%2===0){doc.setFillColor(249,250,251);doc.rect(margin,y0,W-2*margin,8,'F');}
    doc.setFont(undefined,'normal');doc.setTextColor(17,24,39);doc.setFontSize(10);
    doc.text('Loyer '+slugVersLabel(slug),margin+3,y0+5.5);
    doc.text(fmt(l.loyer)+' Fr',W-margin-3,y0+5.5,{align:'right'});
    y0+=8;
  });
  y0+=2;
  doc.setFillColor(26,86,219);doc.rect(margin,y0,W-2*margin,10,'F');
  doc.setTextColor(255,255,255);doc.setFont(undefined,'bold');doc.setFontSize(11);
  doc.text('MONTANT REÇU',margin+3,y0+7);
  doc.text(fmt(l.montantPaye)+' Fr CFA',W-margin-3,y0+7,{align:'right'});
  y0+=14;

  // ═══ SITUATION DU COMPTE ═══
  // Dette antérieure = solde AVANT ce paiement (solde actuel + montant payé - loyers de la période)
  const loyerDu = l.loyer * nbM;
  const soldeActuel = l.solde || 0;
  const detteAnterieure = soldeActuel + l.montantPaye - loyerDu;
  // soldeRestant = ce qui reste à payer APRÈS ce paiement = solde actuel
  const soldeRestant = soldeActuel;

  const showSituation = detteAnterieure > 0 || soldeRestant !== 0;

  if (showSituation) {
    doc.setFillColor(243,244,246);doc.rect(margin,y0,W-2*margin,8,'F');
    doc.setTextColor(26,86,219);doc.setFont(undefined,'bold');doc.setFontSize(10);
    doc.text('SITUATION DU COMPTE',margin+3,y0+5.5);
    y0 += 10;
    doc.setFont(undefined,'normal');doc.setFontSize(9);doc.setTextColor(55,65,81);

    // Report dette antérieure (seulement si elle existe)
    if (detteAnterieure > 0) {
      doc.setTextColor(224,36,36);
      doc.text('Report solde antérieur (impayé)',margin+3,y0+5);
      doc.text(fmt(detteAnterieure)+' Fr',W-margin-3,y0+5,{align:'right'});
      doc.setTextColor(55,65,81);
      y0 += 7;
      doc.setDrawColor(229,231,235);doc.setLineWidth(0.2);doc.line(margin,y0,W-margin,y0);
    }

    // Loyer de la période
    doc.text('Loyer dû pour la période ('+nbM+' mois)',margin+3,y0+5);
    doc.text(fmt(loyerDu)+' Fr',W-margin-3,y0+5,{align:'right'});
    y0 += 7;
    doc.setDrawColor(229,231,235);doc.setLineWidth(0.2);doc.line(margin,y0,W-margin,y0);

    // Total dû
    const totalDu = (detteAnterieure > 0 ? detteAnterieure : 0) + loyerDu;
    doc.setFont(undefined,'bold');
    doc.text('Total dû',margin+3,y0+5);
    doc.text(fmt(totalDu)+' Fr',W-margin-3,y0+5,{align:'right'});
    doc.setFont(undefined,'normal');
    y0 += 7;
    doc.setDrawColor(229,231,235);doc.line(margin,y0,W-margin,y0);

    // Paiement reçu
    doc.setTextColor(5,122,85);
    doc.text('Paiement reçu le '+fmtDate(l.datePaie),margin+3,y0+5);
    doc.text('- '+fmt(l.montantPaye)+' Fr',W-margin-3,y0+5,{align:'right'});
    doc.setTextColor(55,65,81);
    y0 += 7;
    doc.setDrawColor(26,86,219);doc.setLineWidth(0.4);doc.line(margin,y0,W-margin,y0);

    // Solde final
    y0 += 3;
    doc.setFont(undefined,'bold');doc.setFontSize(10);
    if (soldeRestant > 0) {
      doc.setTextColor(224,36,36);
      doc.text('Solde au '+dateFR()+' :',margin+3,y0+5);
      doc.text('RESTE DÛ : '+fmt(soldeRestant)+' Fr CFA',W-margin-3,y0+5,{align:'right'});
    } else if (soldeRestant < 0) {
      doc.setTextColor(5,122,85);
      doc.text('Solde au '+dateFR()+' :',margin+3,y0+5);
      doc.text('AVANCE : '+fmt(-soldeRestant)+' Fr CFA',W-margin-3,y0+5,{align:'right'});
    } else {
      doc.setTextColor(5,122,85);
      doc.text('Solde au '+dateFR()+' :',margin+3,y0+5);
      doc.text('COMPTE SOLDÉ',W-margin-3,y0+5,{align:'right'});
    }
    y0 += 14;
  } else {
    y0 += 2;
    doc.setFontSize(9);doc.setFont(undefined,'bold');doc.setTextColor(5,122,85);
    doc.text('Compte à jour — aucun solde dû.',margin+3,y0+5);
    y0 += 12;
  }

  doc.setFont(undefined,'normal');doc.setFontSize(9);doc.setTextColor(107,114,128);
  doc.text('Mode : '+(l.modePaieMois||l.modePaie)+(l.numTransaction?' · N° '+l.numTransaction:''),margin,y0);

  pdfLegal(doc,margin,y0+10);
  pdfSignature(doc,W,margin,Math.max(y0+22,246));
  doc.setFontSize(7.5);doc.setTextColor(180,180,180);
  doc.text('Réf. '+l.appt+'-'+(l.moisCouverts[0]||slugDuMois())+' | Généré le '+dateFR(),margin,290);
  doc.save('Quittance_'+l.nom+'_'+(l.moisCouverts[0]||slugDuMois())+'.pdf');
}

// ═══════ AVIS D'ÉCHÉANCE (modèle Batigère) ═══════
async function genererAvisEcheance(idLoc){
  const l=locataires.find(x=>x.id===idLoc);
  if(!l)return;
  // Ouvrir l'onglet PENDANT le geste utilisateur (sinon iOS bloque),
  // le PDF y sera injecté une fois les données du compte reçues
  const win = window.open('', '_blank');
  if (win) { try { win.document.write('<p style="font-family:sans-serif;padding:20px;">Préparation de l\'avis d\'échéance…</p>'); } catch(e){} }
  const rc=await get('getCompte',{idLoc});
  const compte=rc.data||{ledger:[],solde:0};
  const soldeCompte=compte.solde;
  const echeanceMois=l.loyer;
  const montantARegler=Math.max(0,soldeCompte);

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,margin=15;
  const moisCourantLabel=MOIS[new Date().getMonth()]+' '+new Date().getFullYear();

  pdfHeader(doc,W,margin);
  doc.setTextColor(17,24,39);doc.setFontSize(15);doc.setFont(undefined,'bold');
  doc.text("AVIS D'ÉCHÉANCE",margin,55);
  doc.setFontSize(10);doc.setFont(undefined,'normal');doc.setTextColor(107,114,128);
  doc.text(moisCourantLabel.toUpperCase(),margin,62);
  doc.setDrawColor(26,86,219);doc.setLineWidth(0.5);doc.line(margin,66,W-margin,66);

  doc.setFontSize(10);doc.setTextColor(17,24,39);doc.setFont(undefined,'bold');
  doc.text(l.nom+(l.prenom?' '+l.prenom:''),W-margin,75,{align:'right'});
  doc.setFont(undefined,'normal');doc.setFontSize(9);doc.setTextColor(107,114,128);
  doc.text('Appartement '+l.appt+' — Immeuble 2i',W-margin,81,{align:'right'});
  doc.text('Palmeraies, Cocody — Abidjan',W-margin,86,{align:'right'});

  // Bloc montant à régler
  const mY=96;
  doc.setFillColor(26,86,219);doc.rect(margin,mY,W-2*margin,18,'F');
  doc.setTextColor(255,255,255);doc.setFont(undefined,'bold');doc.setFontSize(12);
  doc.text('MONTANT À RÉGLER',margin+4,mY+11);
  doc.setFontSize(16);
  doc.text(fmt(Math.max(montantARegler,echeanceMois))+' Fr CFA',W-margin-4,mY+11.5,{align:'right'});

  let y0=mY+26;
  doc.setFontSize(10);doc.setTextColor(55,65,81);doc.setFont(undefined,'normal');
  doc.text('Montant de cette échéance ('+moisCourantLabel+')',margin+3,y0);
  doc.text(fmt(echeanceMois)+' Fr',W-margin-3,y0,{align:'right'});
  y0+=7;
  doc.text('Solde de votre compte au '+dateFR(),margin+3,y0);
  doc.setTextColor(soldeCompte>0?224:5,soldeCompte>0?36:122,soldeCompte>0?36:85);
  doc.text((soldeCompte>0?fmt(soldeCompte):soldeCompte<0?'− '+fmt(-soldeCompte):'0')+' Fr',W-margin-3,y0,{align:'right'});
  doc.setTextColor(55,65,81);
  y0+=10;
  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text("Il est possible qu'un versement récent n'ait pas encore été comptabilisé. Dans ce cas, ne pas tenir compte de ce rappel.",margin,y0);
  y0+=10;

  // Situation du compte (15 dernières opérations)
  doc.setFillColor(243,244,246);doc.rect(margin,y0,W-2*margin,8,'F');
  doc.setTextColor(26,86,219);doc.setFont(undefined,'bold');doc.setFontSize(10);
  doc.text('SITUATION DU COMPTE',margin+3,y0+5.5);
  y0+=10;
  doc.setFontSize(8);doc.setFont(undefined,'bold');doc.setTextColor(107,114,128);
  doc.text('Date',margin+3,y0+4);
  doc.text('Opération',margin+30,y0+4);
  doc.text('Débit',W-margin-45,y0+4,{align:'right'});
  doc.text('Crédit',W-margin-3,y0+4,{align:'right'});
  y0+=6;
  doc.setFont(undefined,'normal');doc.setFontSize(8);
  compte.ledger.slice(-14).reverse().forEach((op,i)=>{
    if(i%2===0){doc.setFillColor(249,250,251);doc.rect(margin,y0,W-2*margin,6,'F');}
    doc.setTextColor(55,65,81);
    doc.text(op.date,margin+3,y0+4);
    doc.text(op.libelle.substring(0,45),margin+30,y0+4);
    if(op.debit)doc.text(fmt(op.debit),W-margin-45,y0+4,{align:'right'});
    if(op.credit)doc.text(fmt(op.credit),W-margin-3,y0+4,{align:'right'});
    y0+=6;
  });
  y0+=3;
  doc.setFont(undefined,'bold');doc.setFontSize(9);
  doc.setTextColor(soldeCompte>0?224:5,soldeCompte>0?36:122,soldeCompte>0?36:85);
  doc.text('Solde au '+dateFR()+' : '+(soldeCompte>0?fmt(soldeCompte)+' Fr dû':soldeCompte<0?fmt(-soldeCompte)+' Fr d\'avance':'compte à jour'),W-margin-3,y0+4,{align:'right'});

  pdfLegal(doc,margin,Math.max(y0+14,262));
  doc.setFontSize(7.5);doc.setTextColor(180,180,180);
  doc.text('Avis émis le '+dateFR()+' | Réf. '+l.appt+'-'+slugDuMois(),margin,290);
  if (win && !win.closed) {
    win.location.href = doc.output('bloburl');
  } else {
    doc.save('Avis_echeance_'+l.nom+'_'+slugDuMois()+'.pdf');
  }
}

// ═══════ LETTRES ═══════
function chargerLettres(){
  let h=`<div style="padding:14px;">
    <div class="card" style="background:var(--blue-light);">
      <div style="font-size:13px;color:var(--blue);font-weight:600;margin-bottom:4px;">Générateur de lettres officielles</div>
      <div style="font-size:12px;color:var(--gray-700);">Relance, mise en demeure, congé de bail (préavis légal 2 mois). Toutes les lettres reprennent automatiquement la situation du compte du locataire.</div>

        <div class="loc-info">
          <div class="avatar ${l.solde>0?'av-red':'av-green'}">${ini(l.nom+' '+l.prenom)}</div>

function ouvrirLettre(idLoc){
  document.getElementById('let-idloc').value=idLoc;
  document.getElementById('let-type').onchange=function(){
    document.getElementById('let-date-wrap').style.display=this.value==='conge'?'block':'none';
  };
  openModal('modal-lettre');
}

async function genererLettre(){
  const idLoc=document.getElementById('let-idloc').value;
  const type=document.getElementById('let-type').value;
  const motif=document.getElementById('let-motif').value;
  const dateFin=document.getElementById('let-date-fin').value;
  const l=locataires.find(x=>x.id===idLoc);
  if(!l)return;
  closeModal('modal-lettre');
  const solde=l.solde||0;

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,margin=20;
  pdfHeader(doc,W,margin-5);

  doc.setTextColor(17,24,39);doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.text('Abidjan, le '+dateFR(),W-margin,55,{align:'right'});
  doc.setFont(undefined,'bold');
  doc.text(l.nom+(l.prenom?' '+l.prenom:''),W-margin,65,{align:'right'});
  doc.setFont(undefined,'normal');doc.setFontSize(9);
  doc.text('Appartement '+l.appt+' — Immeuble 2i',W-margin,71,{align:'right'});
  doc.text('Palmeraies, Cocody — Abidjan',W-margin,76,{align:'right'});

  let titre='',corps=[];
  const nomC=l.nom+(l.prenom?' '+l.prenom:'');

  if(type==='relance'){
    titre='Objet : Relance — Loyer impayé';
    corps=[
    'Madame, Monsieur '+nomC+',',
    '',
    "Sauf erreur ou omission de notre part, nous constatons qu'à ce jour votre compte locataire",
    'présente un solde débiteur de '+fmt(solde)+' Fr CFA au titre du loyer de votre appartement '+l.appt+'.',
    '',
    'Nous vous invitons à régulariser votre situation dans les meilleurs délais, soit par Mobile',
    'Money, soit par dépôt ou virement bancaire, selon vos habitudes de paiement.',
    '',
    "Si votre règlement a été effectué récemment, nous vous prions de ne pas tenir compte de ce",
    'courrier et vous remercions de votre ponctualité.',
    '',
    'Nous restons à votre disposition pour tout arrangement ou échéancier de paiement.',
    ];
  } else if(type==='demeure'){
    titre='Objet : MISE EN DEMEURE — Loyers impayés';
    corps=[
    'Madame, Monsieur '+nomC+',',
    '',
    'Malgré notre relance restée sans effet, votre compte locataire présente à ce jour un solde',
    'débiteur de '+fmt(solde)+' Fr CFA au titre des loyers de votre appartement '+l.appt+'.',
    '',
    'Par la présente, nous vous mettons en demeure de régler la somme de '+fmt(solde)+' Fr CFA',
    'sous huitaine à compter de la réception de ce courrier.',
    '',
    "À défaut de règlement dans ce délai, nous nous réservons le droit d'engager toute procédure",
    'de recouvrement et de résiliation du bail, conformément à la loi ivoirienne n°60-315 du',
    '21 septembre 1960 et aux dispositions du Code Civil applicable en Côte d\'Ivoire.',
    '',
    'Cette mise en demeure fait courir les intérêts légaux et constitue le point de départ des',
    'délais de procédure.',
    ];
  } else {
    const dateFinF=dateFin?dateFin.split('-').reverse().join('/'):'—';
    titre='Objet : Congé — Résiliation du bail (préavis de 2 mois)';
    corps=[
    'Madame, Monsieur '+nomC+',',
    '',
    'Par la présente, nous vous notifions notre décision de mettre fin au bail de location',
    "de l'appartement "+l.appt+" de l'Immeuble 2i, sis aux Palmeraies, Cocody, Abidjan.",
    '',
    'Conformément au préavis légal de deux (2) mois, le bail prendra fin le '+dateFinF+'.',
    '',
    "Vous voudrez bien libérer les lieux au plus tard à cette date, et convenir avec nous d'un",
    "rendez-vous pour l'état des lieux de sortie et la remise des clés.",
    '',
    'Le dépôt de garantie vous sera restitué dans les conditions prévues au bail, déduction',
    'faite des éventuelles sommes restant dues et des réparations locatives constatées.',
    (solde>0?'':''),
    (solde>0?'Nous vous rappelons que votre compte présente un solde débiteur de '+fmt(solde)+' Fr CFA':''),
    (solde>0?'à régulariser avant votre départ.':''),
    ];
  }
  if(motif){corps.push('');corps.push('Précision : '+motif);}
  corps.push('');
  corps.push("Veuillez agréer, Madame, Monsieur, l'expression de nos salutations distinguées.");

  doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(17,24,39);
  doc.text(titre,margin,92);
  doc.setDrawColor(26,86,219);doc.line(margin,95,margin+doc.getTextWidth(titre),95);
  doc.setFont(undefined,'normal');doc.setFontSize(10);doc.setTextColor(55,65,81);
  let ly=105;
  corps.forEach(line=>{if(line!==''||true){doc.text(line,margin,ly);ly+=line===''?4:6;}});

  pdfLegal(doc,margin,Math.max(ly+8,255));
  pdfSignature(doc,W,margin,Math.max(ly+16,240)>246?246:Math.max(ly+16,240));
  doc.save('Lettre_'+type+'_'+l.nom+'_'+slugDuMois()+'.pdf');
}
</script>


<script>
// ═══════ TRÉSORERIE ═══════
async function chargerTresorerie(){
  try{
    const r=await get('getCaisses');
    const d=r.data||{caisse1:{solde:0,encaissementsMois:0,loyers:[],operations:[]},caisse2:{solde:0,encaissementsMois:0,loyers:[],operations:[]}};
    const c1=d.caisse1,c2=d.caisse2;
    const encC1=c1.encaissementsMois||0, encC2=c2.encaissementsMois||0;
    const depC1=(c1.operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
    const depC2=(c2.operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
    const totalEnc=encC1+encC2, totalDep=depC1+depC2;
    const s1=c1.solde||0, s2=c2.solde||0;

    let h=`<div style="padding:14px;">
      <div class="card-grid">
        <div class="card" style="border-left:4px solid var(--green);margin-bottom:0;">
          <div class="stat-label">Caisse 1 — Mobile Money/Espèces</div>
          <div class="stat-val" style="color:${s1>=0?'var(--green)':'var(--red)'};">${fmt(s1)}</div>
          <div class="stat-sub">Fr CFA · Maman Diaby</div></div>
        <div class="card" style="border-left:4px solid var(--blue);margin-bottom:0;">
          <div class="stat-label">Caisse 2 — Banque</div>
          <div class="stat-val" style="color:${s2>=0?'var(--green)':'var(--red)'};">${fmt(s2)}</div>
          <div class="stat-sub">Fr CFA</div></div>
      </div>
      <div class="card"><div class="stat-label">Trésorerie totale</div>
        <div class="stat-val" style="color:var(--green);">${fmt(s1+s2)}</div><div class="stat-sub">Fr CFA</div></div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <button class="btn-primary" style="flex:1;" onclick="ouvrirDepense(1)">+ Dépense Caisse 1</button>
        <button class="btn-primary" style="flex:1;background:var(--blue-dark);" onclick="ouvrirDepense(2)">+ Dépense Banque</button>
      </div>
      <button class="btn-gray" style="width:100%;margin-bottom:14px;" onclick="ouvrirTransfert()">↗ Transfert C1 → Banque</button>`;

    const section=(titre,items,total,pos)=>{
      if(!items.length)return '';
      let s=`<div class="section-title" style="padding-left:0;">${titre}</div><div class="card">`;
      items.forEach(op=>{
        const isE=op.entree>0;
        s+=`<div class="op-row"><div><div class="op-label">${op.description}</div><div class="op-sub">${op.date} · ${op.categorie||''}</div></div>
        <div style="text-align:right;"><span class="op-val ${isE?'pos':'neg'}">${isE?'+':'− '}${fmt(isE?op.entree:op.sortie)}</span>${op.solde!==undefined?'<div class="op-sub">Solde: '+fmt(op.solde)+'</div>':''}</div></div>`;
      });
      s+=`<div class="op-row"><div class="op-label" style="font-weight:700;">Total</div><span class="op-val ${pos?'pos':'neg'}" style="font-weight:700;">${pos?'+':'−'} ${fmt(total)} Fr</span></div></div>`;
      return s;
    };
    h+=section('Caisse 1 — Loyers du mois',c1.loyers||[],encC1,true);
    h+=section('Caisse 1 — Dépenses du mois',c1.operations||[],depC1,false);
    h+=section('Caisse 2 — Loyers du mois',c2.loyers||[],encC2,true);
    h+=section('Caisse 2 — Dépenses du mois',c2.operations||[],depC2,false);

    const net=totalEnc-totalDep;
    h+=`<div class="section-title" style="padding-left:0;">Récapitulatif du mois</div><div class="card">
      <div class="fin-row"><span>Loyers encaissés</span><span class="op-val pos">+ ${fmt(totalEnc)} Fr</span></div>
      <div class="fin-row"><span>Dépenses du mois</span><span class="op-val neg">− ${fmt(totalDep)} Fr</span></div>
      <div class="fin-row"><span style="font-weight:700;">Résultat net du mois</span><span style="font-weight:700;color:${net>=0?'var(--green)':'var(--red)'};">${net>=0?'+':'−'} ${fmt(Math.abs(net))} Fr</span></div>
      <div class="fin-row"><span>Trésorerie totale</span><span style="font-weight:700;color:var(--blue);">${fmt(s1+s2)} Fr</span></div>
    </div></div>`;
    document.getElementById('proprio-content').innerHTML=h;
  }catch(err){
    document.getElementById('proprio-content').innerHTML='<div style="padding:20px;color:var(--red);">Erreur: '+err.message+'</div>';
  }
}

function ouvrirDepense(caisse){
  document.getElementById('dep-caisse').value=caisse;
  document.getElementById('dep-titre').textContent=caisse===1?'Dépense Caisse 1':'Dépense Banque';
  openModal('modal-depense');
}
async function validerDepense(){
  const caisse=parseInt(document.getElementById('dep-caisse').value);
  const cat=document.getElementById('dep-cat').value;
  const desc=document.getElementById('dep-desc').value;
  const montant=parseInt(document.getElementById('dep-montant').value)||0;
  if(!montant){alert('Montant requis.');return;}
  closeModal('modal-depense');
  await api({action:'addDepense',caisse,categorie:cat,description:desc,montant});
  chargerTresorerie();
}
function ouvrirTransfert(){
  const m=prompt('Montant à transférer vers la banque :');
  if(!m||isNaN(m))return;
  api({action:'addTransfert',montant:parseInt(m)}).then(()=>chargerTresorerie());
}

// ═══════ ARCHIVES ═══════
async function chargerArchives(){
  const r=await get('getHistoriqueComplet');
  const data=r.data||[];
  const today=new Date();
  const moisDispos=[];
  for(let i=5;i>=0;i--){
    const d=new Date(today.getFullYear(),today.getMonth()-i,1);
    moisDispos.push({slug:String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'),label:MOIS[d.getMonth()].substring(0,3)});
  }
  let h=`<div style="padding:14px;">
    <div class="section-title" style="padding-left:0;">Régularité — 6 derniers mois</div>
    <div class="card" style="overflow-x:auto;">
    <div style="font-size:11px;color:var(--gray-500);margin-bottom:8px;">✅ payé complet · ◐ partiel · ❌ impayé</div>
    <table class="arch-table"><tr><th style="text-align:left;">Locataire</th>`;
  moisDispos.forEach(m=>h+=`<th>${m.label}</th>`);
  h+=`<th>Score</th></tr>`;
  data.forEach(loc=>{
    const nb=loc.moisPaies.filter(s=>moisDispos.some(m=>m.slug===s)).length;
    const score=Math.round(nb/6*100);
    h+=`<tr><td>${loc.nom}<br><span style="font-size:10px;color:var(--gray-500);">Appt ${loc.appt}</span></td>`;
    moisDispos.forEach(m=>{
      const ok=loc.moisPaies.indexOf(m.slug)!==-1;
      const part=loc.moisPartiels&&loc.moisPartiels.indexOf(m.slug)!==-1;
      h+=`<td>${ok?'✅':part?'◐':'❌'}</td>`;
    });
    h+=`<td style="font-weight:700;color:${score>=80?'var(--green)':score>=50?'var(--amber)':'var(--red)'};">${score}%</td></tr>`;
  });
  h+=`</table></div></div>`;
  document.getElementById('proprio-content').innerHTML=h;
}

// ═══════ FINANCES ═══════
async function chargerFinances(){
  const r=await get('getCaisses');
  const d=r.data||{};
  const encC1=(d.caisse1||{}).encaissementsMois||0;
  const encC2=(d.caisse2||{}).encaissementsMois||0;
  const totalEnc=encC1+encC2;
  const loyerTheo=locataires.reduce((s,l)=>s+l.loyer,0);
  const depC1=((d.caisse1||{}).operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
  const depC2=((d.caisse2||{}).operations||[]).reduce((s,o)=>s+(o.sortie||0),0);
  const totalDep=depC1+depC2;
  const totalDettes=locataires.reduce((s,l)=>s+Math.max(0,l.solde||0),0);
  const totalAvances=locataires.reduce((s,l)=>s+Math.max(0,-(l.solde||0)),0);

  let h=`<div style="padding:14px;">
    <div class="card-grid">
      <div class="stat-card"><div class="stat-label">Loyers théoriques / mois</div><div class="stat-val">${fmt(loyerTheo)}</div><div class="stat-sub">Fr CFA</div></div>
      <div class="stat-card light"><div class="stat-label" style="color:var(--gray-500);">Encaissé ce mois</div><div class="stat-val" style="color:var(--green);">${fmt(totalEnc)}</div><div class="stat-sub" style="color:var(--gray-500);">Fr CFA</div></div>
    </div>
    <div class="card-grid">
      <div class="card" style="background:var(--red-light);margin-bottom:0;"><div class="stat-label" style="color:var(--red);">Créances (dettes locataires)</div>
        <div style="font-size:18px;font-weight:700;color:var(--red);">${fmt(totalDettes)}</div></div>
      <div class="card" style="background:var(--green-light);margin-bottom:0;"><div class="stat-label" style="color:var(--green);">Avances reçues</div>
        <div style="font-size:18px;font-weight:700;color:var(--green);">${fmt(totalAvances)}</div></div>
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:700;color:var(--gray-500);text-transform:uppercase;margin-bottom:12px;">Compte de résultat du mois</div>
      <div class="fin-row"><span>Loyers encaissés</span><span style="color:var(--green);font-weight:600;">+ ${fmt(totalEnc)} Fr</span></div>
      <div class="fin-row"><span>Dépenses du mois</span><span style="color:var(--red);">− ${fmt(totalDep)} Fr</span></div>
      <div class="fin-row"><span>Provision travaux (5%)</span><span style="color:var(--red);">− ${fmt(Math.round(totalEnc*0.05))} Fr</span></div>
      <div class="fin-row" style="border-top:2px solid var(--gray-200);margin-top:6px;padding-top:10px;"><span style="font-weight:700;">Revenu net estimé</span>
        <span style="font-weight:700;color:${totalEnc-totalDep>=0?'var(--green)':'var(--red)'};">${fmt(totalEnc-totalDep-Math.round(totalEnc*0.05))} Fr</span></div>
    </div>
  </div>`;
  document.getElementById('proprio-content').innerHTML=h;
}

// ═══════ TRAVAUX ═══════
async function chargerTravaux(){
  const r=await get('getTravaux');
  travaux=r.data||[];
  const enCours=travaux.filter(t=>t.statut!=='Terminé');
  const termines=travaux.filter(t=>t.statut==='Terminé');
  let h=`<div style="padding:14px;">
    <button class="btn-primary" style="margin-bottom:14px;" onclick="ouvrirNouveauTravail()">+ Nouveau travail</button>`;
  if(enCours.length){h+=`<div class="section-title" style="padding-left:0;">En cours & Devis (${enCours.length})</div>`;enCours.forEach(t=>h+=travailCard(t));}
  if(termines.length){h+=`<div class="section-title" style="padding-left:0;">Terminés (${termines.length})</div>`;termines.forEach(t=>h+=travailCard(t));}
  if(!travaux.length)h+=`<div class="card" style="text-align:center;color:var(--gray-400);padding:40px;">Aucun travail</div>`;
  h+=`</div>`;
  document.getElementById('proprio-content').innerHTML=h;
}

function travailCard(t){
  const pc=t.statut==='Terminé'?'pill-green':t.statut==='En cours'?'pill-amber':t.statut==='Négociation'?'pill-violet':'pill-blue';
  const red=t.devis&&t.devisNegocie?Math.round((1-t.devisNegocie/t.devis)*100):0;
  const label=t.factureFinale?fmt(t.factureFinale)+' Fr (facture)':t.devisNegocie?fmt(t.devisNegocie)+' Fr (négocié)':fmt(t.devis)+' Fr (devis)';
  const note=t.notes?t.notes.split('\n').pop():'';
  return `<div class="travail-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${t.desc||'—'}</div>
      <div style="font-size:11px;color:var(--gray-500);margin-top:2px;">${t.categorie||''}${t.artisan?' · '+t.artisan:''}</div></div>
      <span class="pill ${pc}">${t.statut}</span>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${label}${red>0?' <span style="color:var(--green);font-size:11px;">(−'+red+'%)</span>':''}</div>
    ${note?`<div style="font-size:11px;color:var(--gray-500);background:var(--gray-50);padding:6px 8px;border-radius:6px;margin-bottom:8px;">${note}</div>`:''}
    <div style="display:flex;gap:8px;">
      <button class="btn-violet" onclick="ouvrirEditerTravail('${t.id}')">✏️ Modifier</button>
      ${t.statut!=='Terminé'?`<button class="btn-green" onclick="terminerTravail('${t.id}')">✓ Terminer</button>`:''}
    </div></div>`;
}

function ouvrirNouveauTravail(){
  document.getElementById('trav-titre').textContent='Nouveau travail';
  document.getElementById('trav-id').value='';
  ['trav-desc','trav-artisan','trav-notes','trav-devis','trav-devis-neg','trav-facture'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-travail');
}
function ouvrirEditerTravail(id){
  const t=travaux.find(x=>x.id===id);if(!t)return;
  document.getElementById('trav-titre').textContent='Modifier';
  document.getElementById('trav-id').value=id;
  document.getElementById('trav-desc').value=t.desc||'';
  document.getElementById('trav-artisan').value=t.artisan||'';
  document.getElementById('trav-statut').value=t.statut||'Devis';
  document.getElementById('trav-devis').value=t.devis||'';
  document.getElementById('trav-devis-neg').value=t.devisNegocie||'';
  document.getElementById('trav-facture').value=t.factureFinale||'';
  document.getElementById('trav-notes').value='';
  openModal('modal-travail');
}
async function sauvegarderTravail(){
  const id=document.getElementById('trav-id').value;
  const data={idAppt:document.getElementById('trav-appt').value,categorie:document.getElementById('trav-cat').value,
    desc:document.getElementById('trav-desc').value,artisan:document.getElementById('trav-artisan').value,
    statut:document.getElementById('trav-statut').value,
    devis:parseInt(document.getElementById('trav-devis').value)||0,
    devisNegocie:parseInt(document.getElementById('trav-devis-neg').value)||0,
    factureFinale:parseInt(document.getElementById('trav-facture').value)||0,
    notes:document.getElementById('trav-notes').value};
  closeModal('modal-travail');
  if(id)await api({action:'updateTravail',idTrav:id,data:JSON.stringify(data)});
  else await api({action:'addTravail',data:JSON.stringify(data)});
  chargerTravaux();
}
async function terminerTravail(id){
  const f=prompt('Montant facture finale :');
  if(f===null)return;
  await api({action:'updateTravail',idTrav:id,data:JSON.stringify({statut:'Terminé',factureFinale:parseInt(f)||0})});
  chargerTravaux();
}

// ═══════ ARTISANS ═══════
async function chargerArtisans(){
  const r=await get('getArtisans');
  const arts=r.data||[];
  let h=`<div style="padding:14px;"><button class="btn-primary" style="margin-bottom:14px;" onclick="ajouterArtisan()">+ Ajouter artisan</button>`;
  if(!arts.length)h+=`<div class="card" style="text-align:center;color:var(--gray-400);padding:40px;">Aucun artisan</div>`;
  else arts.forEach(a=>{
    h+=`<div class="card"><div style="font-size:14px;font-weight:600;">${a.nom}</div>
    <div style="font-size:12px;color:var(--gray-500);margin-top:4px;">${a.metier} · ${a.tel}</div>
    ${a.note?`<div style="margin-top:6px;"><span class="pill pill-amber">★ ${a.note}/5</span></div>`:''}</div>`;
  });
  h+=`</div>`;
  document.getElementById('proprio-content').innerHTML=h;
}
async function ajouterArtisan(){
  const nom=prompt('Nom :');if(!nom)return;
  const metier=prompt('Métier :');if(!metier)return;
  const tel=prompt('Téléphone :')||'';
  await api({action:'addArtisan',data:JSON.stringify({nom,metier,tel})});
  chargerArtisans();
}

// ═══════ PORTAIL LOCATAIRE ═══════
function chargerPortailLogin(){
  document.getElementById('portail-content').innerHTML=`<div style="padding:24px;">
    <div class="card"><div class="modal-title">Accès locataire</div>
    <div class="form-group"><label class="form-label">Identifiant</label><input type="text" id="p-id"></div>
    <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="p-mdp"></div>
    <div id="p-err" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none;"></div>
    <button class="btn-primary" onclick="connecterLocataire()">Accéder</button></div></div>`;
}

async function connecterLocataire(){
  const id=document.getElementById('p-id').value.trim();
  const mdp=document.getElementById('p-mdp').value.trim();
  const r=await get('getPortail',{id,mdp});
  if(r.success){
    session={type:'locataire',id:r.idLoc,nom:r.nom,appt:r.appt};
    document.getElementById('portail-nom').textContent=r.nom+' — Appt '+r.appt;
    chargerPortailDashboard();
  } else {
    document.getElementById('p-err').textContent='Identifiants incorrects.';
    document.getElementById('p-err').style.display='block';
  }
}

async function chargerPortailDashboard(){
  const [rh,rc]=await Promise.all([
    get('getHistorique',{id:session.id}),
    get('getCompte',{idLoc:session.id})
  ]);
  const hist=rh.data||[];
  const compte=rc.data||{solde:0};
  const solde=compte.solde;

  let h=`<div style="padding:14px;">
    <div class="card" style="border-left:4px solid ${solde>0?'var(--red)':'var(--green)'};">
      <div style="font-size:13px;font-weight:600;color:${solde>0?'var(--red)':'var(--green)'};">
        ${solde>0?'Solde dû : '+fmt(solde)+' Fr CFA':solde<0?'Avance : '+fmt(-solde)+' Fr CFA':'✅ Compte à jour'}
      </div>
    </div>
    <div class="section-title" style="padding-left:0;">Historique des paiements</div>`;
  if(!hist.length)h+=`<div class="card" style="text-align:center;color:var(--gray-400);">Aucun paiement</div>`;
  else hist.slice().reverse().forEach(p=>{
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:14px;font-weight:600;">${slugVersLabel(p.moisSlug)}</div>
      <div style="font-size:12px;color:var(--gray-500);">${p.datePaie} · ${p.mode}</div></div>
      <div style="font-size:15px;font-weight:700;color:var(--green);">${fmt(p.montant)} Fr</div>
    </div></div>`;
  });
  h+=`</div>`;
  document.getElementById('portail-content').innerHTML=h;
}
</script>
<script>
// Wrappers anti-erreur silencieuse (mobile sans console)
function safe(fn){
  return async function(...args){
    try { await fn(...args); }
    catch(e) { alert('Erreur PDF : ' + (e && e.message ? e.message : e)); }
  };
}
window.addEventListener('DOMContentLoaded', function(){
  if (typeof genererQuittance === 'function')     window.genererQuittance     = safe(genererQuittance);
  if (typeof genererAvisEcheance === 'function')  window.genererAvisEcheance  = safe(genererAvisEcheance);
  if (typeof genererLettre === 'function')        window.genererLettre        = safe(genererLettre);
  // Si les fonctions n'existent pas, le bloc PDF a planté au chargement : le signaler
  if (typeof genererQuittance !== 'function') {
    window.genererQuittance = window.genererAvisEcheance = function(){
      alert('Version obsolète chargée (bloc PDF absent). Videz le cache ou rechargez en navigation privée.');
    };
  }
});
</script>
</body>
