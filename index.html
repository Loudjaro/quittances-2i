<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Immeuble 2i">
<title>Immeuble 2i</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1a1a1a;max-width:480px;margin:0 auto;min-height:100vh;}
.topbar{background:#fff;padding:16px 16px 12px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.appname{font-size:17px;font-weight:600;}
.sync-info{font-size:11px;color:#888;margin-top:2px;}
.sync-btn{font-size:12px;background:#f0f0f0;padding:6px 14px;border-radius:99px;border:none;cursor:pointer;font-weight:500;}
.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;}
.nav-btn{flex:1;padding:12px 4px;font-size:11px;color:#888;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-btn.active{color:#1a1a1a;font-weight:600;border-bottom:2px solid #1a1a1a;}
.screen{padding:16px;display:none;}
.screen.active{display:block;}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;}
.metric.full{grid-column:1/-1;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;}
.metric-val{font-size:22px;font-weight:600;}
.metric-val.green{color:#2d7a3a;}
.metric-val.red{color:#c0392b;}
.metric-sub{font-size:11px;color:#888;margin-top:2px;}
.stitle{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.prog-bg{background:#e5e5e5;border-radius:99px;height:7px;margin-bottom:16px;}
.prog-fill{height:7px;border-radius:99px;background:#2d7a3a;transition:width .4s;}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:10px;}
.loc-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.loc-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.av-g{background:#d4f0d8;color:#1e5c26;}
.av-r{background:#fde8e8;color:#c0392b;}
.av-a{background:#fef3e2;color:#a05c00;}
.loc-nom{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.loc-sub{font-size:11px;color:#888;margin-top:2px;}
.pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:99px;flex-shrink:0;margin-left:8px;border:none;cursor:pointer;}
.pill-g{background:#d4f0d8;color:#1e5c26;}
.pill-r{background:#fde8e8;color:#c0392b;}
.pill-a{background:#fef3e2;color:#a05c00;}
.btn-primary{display:block;width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px;}
.btn-success{padding:8px 14px;background:#d4f0d8;color:#1e5c26;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.row:last-child{border-bottom:none;}
.row.total{font-weight:600;padding-top:12px;margin-top:4px;border-top:1px solid #e5e5e5;border-bottom:none;}
.row-label{color:#666;}
.row-val{font-weight:500;}
.row-val.pos{color:#2d7a3a;}
.row-val.neg{color:#c0392b;}
.loading-box{text-align:center;padding:50px 20px;color:#888;font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid #e5e5e5;border-top:3px solid #1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.alert-box{background:#fef3e2;border-radius:12px;padding:12px 14px;font-size:13px;color:#a05c00;margin-top:4px;line-height:1.5;}
.success-box{background:#d4f0d8;border-radius:12px;padding:12px 14px;font-size:13px;color:#1e5c26;margin-bottom:14px;}
.error-box{background:#fde8e8;border-radius:12px;padding:12px 14px;font-size:13px;color:#c0392b;margin-bottom:14px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:#666;margin-bottom:5px;display:block;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;font-size:14px;padding:11px 12px;border:1px solid #e5e5e5;border-radius:10px;background:#f8f8f8;color:#1a1a1a;-webkit-appearance:none;}
.form-group textarea{height:80px;resize:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.form-actions button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;}
.btn-cancel{background:#f0f0f0;color:#666;}
.btn-save{background:#1a1a1a;color:#fff;}

/* TRAVAUX */
.travail-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:8px;}
.travail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.travail-title{font-size:14px;font-weight:500;flex:1;}
.travail-meta{font-size:11px;color:#888;margin-top:3px;}
.travail-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;}
.cat-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;}

/* ARTISANS */
.artisan-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;}
.artisan-av{width:42px;height:42px;border-radius:50%;background:#E6F1FB;color:#0C447C;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.artisan-nom{font-size:14px;font-weight:500;}
.artisan-meta{font-size:11px;color:#888;margin-top:2px;}
.artisan-tel{font-size:12px;color:#185FA5;margin-top:3px;}
.stars{color:#BA7517;font-size:12px;}

.tab-toggle{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-toggle button{flex:1;padding:7px;font-size:12px;font-weight:500;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#888;}
.tab-toggle button.active{background:#fff;color:#1a1a1a;font-weight:600;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="appname">Immeuble 2i</div>
    <div class="sync-info" id="sync-info">Chargement...</div>
  </div>
  <button class="sync-btn" onclick="chargerTout()">Actualiser</button>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('paiements',this)">Paiements</button>
  <button class="nav-btn" onclick="showTab('finances',this)">Finances</button>
  <button class="nav-btn" onclick="showTab('travaux',this)">Travaux</button>
  <button class="nav-btn" onclick="showTab('artisans',this)">Artisans</button>
</div>

<div class="screen active" id="tab-paiements">
  <div id="paiements-content"><div class="loading-box"><div class="spinner"></div>Connexion...</div></div>
</div>
<div class="screen" id="tab-finances">
  <div id="finances-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>
<div class="screen" id="tab-travaux">
  <div id="travaux-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>
<div class="screen" id="tab-artisans">
  <div id="artisans-content"><div class="loading-box"><div class="spinner"></div>Chargement...</div></div>
</div>

<!-- MODAL TRAVAIL -->
<div class="modal-overlay" id="modal-travail">
  <div class="modal">
    <div class="modal-title" id="modal-travail-title">Nouveau travail</div>
    <div class="form-group">
      <label class="form-label">Appartement</label>
      <select id="t-appt">
        <option>Espaces communs</option>
        <option>M1</option><option>M2</option><option>M3</option><option>M4</option>
        <option>10</option><option>11</option><option>12</option>
        <option>20</option><option>21</option><option>30</option><option>31</option>
        <option>14</option><option>V1</option><option>22</option>
        <option>24</option><option>V31</option><option>VR</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select id="t-cat">
          <option>Plomberie</option><option>Électricité</option>
          <option>Peinture / réfection</option><option>Climatisation</option>
          <option>Espaces communs</option><option>Toiture</option><option>Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Statut</label>
        <select id="t-statut">
          <option>Devis</option><option>En cours</option><option>Terminé</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="t-desc" placeholder="Décrivez les travaux..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Montant devis (Fr CFA)</label>
        <input type="number" id="t-devis" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Coût réel (Fr CFA)</label>
        <input type="number" id="t-reel" placeholder="Si terminé">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Artisan</label>
        <input type="text" id="t-artisan" placeholder="Nom artisan">
      </div>
      <div class="form-group">
        <label class="form-label">Date prévue</label>
        <input type="date" id="t-date">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-travail')">Annuler</button>
      <button class="btn-save" onclick="sauvegarderTravail()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL ARTISAN -->
<div class="modal-overlay" id="modal-artisan">
  <div class="modal">
    <div class="modal-title">Nouvel artisan</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input type="text" id="a-nom" placeholder="Kouassi Jean">
      </div>
      <div class="form-group">
        <label class="form-label">Spécialité</label>
        <select id="a-spec">
          <option>Plomberie</option><option>Électricité</option>
          <option>Peinture / réfection</option><option>Climatisation</option>
          <option>Toiture</option><option>Polyvalent</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input type="tel" id="a-tel" placeholder="00225XXXXXXXX">
      </div>
      <div class="form-group">
        <label class="form-label">Note /5</label>
        <input type="number" id="a-note" min="1" max="5" placeholder="5">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Commentaire</label>
      <textarea id="a-comment" placeholder="Fiable, tarifs raisonnables..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-artisan')">Annuler</button>
      <button class="btn-save" onclick="sauvegarderArtisan()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL TERMINER TRAVAIL -->
<div class="modal-overlay" id="modal-terminer">
  <div class="modal">
    <div class="modal-title">Marquer comme terminé</div>
    <div class="form-group">
      <label class="form-label">Coût réel des travaux (Fr CFA)</label>
      <input type="number" id="terminer-montant" placeholder="0">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('modal-terminer')">Annuler</button>
      <button class="btn-save" onclick="confirmerTerminer()">Confirmer</button>
    </div>
  </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwH2uNx0khMYaaZDKTVPUr4Bodblb9iMiWz6zhI-m8V0dLosjo4Og-zabqtqx7IMFCGmg/exec';
const CHARGES_FIXES = 370000;
const LOYER_THEORIQUE = 4560000;

let locataires = [];
let travaux = [];
let artisans = [];
let periodeFinances = 'mensuel';
let travailEnCours = null;

function fmt(n){ return Math.round(n||0).toLocaleString('fr-FR'); }
function initials(s){ return (s||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }

async function get(action){
  const res = await fetch(WEBAPP_URL + '?action=' + action);
  return res.json();
}

async function post(body){
  const res = await fetch(WEBAPP_URL, {
    method:'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

async function chargerTout(){
  document.getElementById('sync-info').textContent = 'Synchronisation...';
  try {
    const [r1, r2, r3] = await Promise.all([get('getLocataires'), get('getTravaux'), get('getArtisans')]);
    locataires = r1.data || [];
    travaux    = r2.data || [];
    artisans   = r3.data || [];
    const now = new Date();
    document.getElementById('sync-info').textContent = 'Mis à jour ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    renderPaiements();
    renderFinances();
    renderTravaux();
    renderArtisans();
  } catch(e){
    document.getElementById('sync-info').textContent = 'Erreur connexion';
    document.getElementById('paiements-content').innerHTML = `<div class="error-box">Erreur de connexion : ${e.message}</div>`;
  }
}

// ── PAIEMENTS ─────────────────────────────────────────────────
function renderPaiements(){
  const payes    = locataires.filter(l=>l.paye);
  const nonPayes = locataires.filter(l=>!l.paye);
  const montant  = payes.reduce((s,l)=>s+l.loyer,0);
  const pct      = locataires.length ? Math.round(payes.length/locataires.length*100) : 0;

  let html = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Loyers perçus</div><div class="metric-val">${payes.length}/${locataires.length}</div><div class="metric-sub">locataires</div></div>
      <div class="metric"><div class="metric-label">Encaissé</div><div class="metric-val green">${fmt(montant)}</div><div class="metric-sub">Fr CFA</div></div>
    </div>
    <div class="stitle">Recouvrement — ${pct}%</div>
    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>`;

  if(payes.length){
    html += `<div class="stitle">Payés (${payes.length})</div>`;
    payes.forEach(l=>{
      html += `<div class="loc-card">
        <div class="loc-left">
          <div class="avatar av-g">${initials(l.nom+' '+l.prenom)}</div>
          <div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
          <div class="loc-sub">Appt ${l.appt} · ${fmt(l.loyer)} Fr · ${l.datePaie||''}</div></div>
        </div>
        <span class="pill pill-g">Payé</span>
      </div>`;
    });
  }

  if(nonPayes.length){
    html += `<div class="stitle" style="margin-top:16px;">En attente — appuyer pour valider (${nonPayes.length})</div>`;
    nonPayes.forEach(l=>{
      html += `<div class="loc-card">
        <div class="loc-left">
          <div class="avatar av-r">${initials(l.nom+' '+l.prenom)}</div>
          <div><div class="loc-nom">${l.nom}${l.prenom?' '+l.prenom:''}</div>
          <div class="loc-sub">Appt ${l.appt} · ${fmt(l.loyer)} Fr CFA</div></div>
        </div>
        <button class="pill pill-a" onclick="validerPaiement(${l.row},'${l.nom} ${l.prenom}')">Valider</button>
      </div>`;
    });
  }
  document.getElementById('paiements-content').innerHTML = html;
}

async function validerPaiement(row, nom){
  if(!confirm('Confirmer le paiement de ' + nom + ' ?')) return;
  document.getElementById('sync-info').textContent = 'Enregistrement...';
  try {
    await post({ action:'setPaye', row:row, paye:true });
    await chargerTout();
  } catch(e){
    alert('Erreur : ' + e.message);
  }
}

// ── FINANCES ──────────────────────────────────────────────────
function renderFinances(){
  const encaisse = locataires.filter(l=>l.paye).reduce((s,l)=>s+l.loyer,0);
  const M = periodeFinances === 'mensuel';
  const k = M ? 1 : 12;
  const loyers   = LOYER_THEORIQUE * k;
  const charges  = CHARGES_FIXES * k;
  const prov     = Math.round(LOYER_THEORIQUE * 0.05) * k;
  const net      = loyers - charges - prov;

  document.getElementById('finances-content').innerHTML = `
    <div class="tab-toggle">
      <button class="${M?'active':''}" onclick="setPeriode('mensuel',this)">Mensuel</button>
      <button class="${!M?'active':''}" onclick="setPeriode('annuel',this)">Annuel</button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Loyers théoriques</div><div class="metric-val">${fmt(loyers)}</div><div class="metric-sub">Fr CFA</div></div>
      <div class="metric"><div class="metric-label">Encaissé ce mois</div><div class="metric-val green">${fmt(encaisse)}</div><div class="metric-sub">Fr CFA</div></div>
    </div>
    <div class="stitle">Compte de résultat</div>
    <div class="card">
      <div class="row"><span class="row-label">Loyers théoriques</span><span class="row-val pos">+ ${fmt(loyers)} Fr</span></div>
      <div class="row"><span class="row-label">Salaire gardien</span><span class="row-val neg">- ${fmt(90000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Eau + électricité</span><span class="row-val neg">- ${fmt(30000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Taxe foncière</span><span class="row-val neg">- ${fmt(125000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Assurance immeuble</span><span class="row-val neg">- ${fmt(125000*k)} Fr</span></div>
      <div class="row"><span class="row-label">Provision travaux (5%)</span><span class="row-val neg">- ${fmt(prov)} Fr</span></div>
      <div class="row total"><span>Revenu net estimé</span><span class="row-val pos">${fmt(net)} Fr</span></div>
    </div>
    <div class="alert-box">Assurance immeuble : à souscrire en urgence — 1 500 000 Fr CFA de risque non couvert.</div>`;
}

function setPeriode(p, btn){
  periodeFinances = p;
  document.querySelectorAll('.tab-toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFinances();
}

// ── TRAVAUX ───────────────────────────────────────────────────
const CAT_COLORS = {
  'Plomberie':'#E6F1FB|#0C447C','Électricité':'#FAEEDA|#854F0B',
  'Peinture / réfection':'#EAF3DE|#3B6D11','Climatisation':'#EEEDFE|#3C3489',
  'Espaces communs':'#f0f0f0|#666','Toiture':'#fde8e8|#c0392b','Autre':'#f0f0f0|#666'
};
function catStyle(cat){
  const c=(CAT_COLORS[cat]||'#f0f0f0|#666').split('|');
  return `background:${c[0]};color:${c[1]};`;
}
const STATUT_PILL = {
  'Devis':'background:#E6F1FB;color:#0C447C;',
  'En cours':'background:#fef3e2;color:#a05c00;',
  'Terminé':'background:#d4f0d8;color:#1e5c26;'
};

function renderTravaux(){
  let html = `<button class="btn-primary" onclick="openModal('modal-travail')">+ Nouveau devis / travail</button>`;
  if(!travaux.length){
    html += `<div class="stitle">Aucun travail enregistré</div>`;
  } else {
    const encours = travaux.filter(t=>t.statut!=='Terminé');
    const termines = travaux.filter(t=>t.statut==='Terminé');
    if(encours.length){
      html += `<div class="stitle">En cours & devis (${encours.length})</div>`;
      encours.forEach(t=>{
        html += travauxCard(t);
      });
    }
    if(termines.length){
      html += `<div class="stitle" style="margin-top:16px;">Terminés (${termines.length})</div>`;
      termines.forEach(t=>{ html += travauxCard(t); });
    }
  }
  document.getElementById('travaux-content').innerHTML = html;
}

function travauxCard(t){
  const sp = STATUT_PILL[t.statut]||'';
  return `<div class="travail-card">
    <div class="travail-header">
      <div style="flex:1;">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;">
          <span class="cat-tag" style="${catStyle(t.categorie)}">${t.categorie}</span>
          <span class="cat-tag" style="${sp}">${t.statut}</span>
        </div>
        <div class="travail-title">${t.desc||'Sans description'}</div>
        <div class="travail-meta">Appt ${t.appt}${t.artisan?' · '+t.artisan:''}</div>
      </div>
    </div>
    <div class="travail-footer">
      <div>
        <span style="font-size:11px;color:#888;">Devis : </span>
        <span style="font-size:14px;font-weight:500;">${fmt(t.devis)} Fr</span>
        ${t.reel?`<span style="font-size:11px;color:#888;margin-left:8px;">Réel : </span><span style="font-size:14px;font-weight:500;color:#2d7a3a;">${fmt(t.reel)} Fr</span>`:''}
      </div>
      ${t.statut!=='Terminé'?`<button class="btn-success" onclick="ouvrirTerminer(${t.row})">Terminer</button>`:`<span style="font-size:11px;color:#888;">${t.date||''}</span>`}
    </div>
  </div>`;
}

async function sauvegarderTravail(){
  const data = {
    appt:      document.getElementById('t-appt').value,
    categorie: document.getElementById('t-cat').value,
    desc:      document.getElementById('t-desc').value,
    statut:    document.getElementById('t-statut').value,
    devis:     parseInt(document.getElementById('t-devis').value)||0,
    reel:      parseInt(document.getElementById('t-reel').value)||0,
    artisan:   document.getElementById('t-artisan').value,
    date:      document.getElementById('t-date').value,
  };
  closeModal('modal-travail');
  document.getElementById('sync-info').textContent = 'Enregistrement...';
  await post({ action:'addTravail', data });
  await chargerTout();
}

function ouvrirTerminer(row){
  travailEnCours = row;
  document.getElementById('terminer-montant').value = '';
  openModal('modal-terminer');
}

async function confirmerTerminer(){
  const montant = parseInt(document.getElementById('terminer-montant').value)||0;
  closeModal('modal-terminer');
  document.getElementById('sync-info').textContent = 'Enregistrement...';
  await post({ action:'updateTravail', row:travailEnCours, data:{
    statut:'Terminé', reel:montant, date:new Date().toLocaleDateString('fr-FR')
  }});
  await chargerTout();
}

// ── ARTISANS ──────────────────────────────────────────────────
function renderArtisans(){
  let html = `<button class="btn-primary" onclick="openModal('modal-artisan')">+ Ajouter un artisan</button>`;
  if(!artisans.length){
    html += `<div class="stitle">Aucun artisan enregistré</div>`;
  } else {
    html += `<div class="stitle">${artisans.length} artisan(s)</div>`;
    artisans.forEach(a=>{
      const ini = (a.nom||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const etoiles = '★'.repeat(a.note||4)+'☆'.repeat(5-(a.note||4));
      html += `<div class="artisan-card">
        <div class="artisan-av">${ini}</div>
        <div style="flex:1;min-width:0;">
          <div class="artisan-nom">${a.nom}</div>
          <div class="artisan-meta">${a.specialite}</div>
          <div class="stars">${etoiles}</div>
          <div class="artisan-tel">${a.tel}</div>
          ${a.comment?`<div class="artisan-meta" style="margin-top:3px;">${a.comment}</div>`:''}
        </div>
      </div>`;
    });
  }
  document.getElementById('artisans-content').innerHTML = html;
}

async function sauvegarderArtisan(){
  const data = {
    nom:       document.getElementById('a-nom').value,
    specialite:document.getElementById('a-spec').value,
    tel:       document.getElementById('a-tel').value,
    note:      parseInt(document.getElementById('a-note').value)||4,
    comment:   document.getElementById('a-comment').value,
  };
  closeModal('modal-artisan');
  document.getElementById('sync-info').textContent = 'Enregistrement...';
  await post({ action:'addArtisan', data });
  await chargerTout();
}

// ── UTILS ─────────────────────────────────────────────────────
function showTab(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// Fermer modal en cliquant dehors
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
});

chargerTout();
</script>

</html>
